<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DSI Live Fixed</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}
.header,.footer{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid #222}
.footer{position:fixed;bottom:0;width:100%;border-top:1px solid #222;border-bottom:none;background:#000}
#subtitles{padding:20px 20px 90px}
.item{margin:20px 0}
.src{color:#888;font-size:28px}
.dst{font-size:40px;font-weight:bold}
#status{color:#0c8}
</style>
</head>
<body>
<div class="header">
<button onclick="history.back()">←</button>
<div>DSI 翻译助手 Live</div>
<button onclick="cycleFont()">字</button>
</div>

<div id="subtitles"></div>

<div class="footer">
<div id="status">准备连接...</div>
<button onclick="exitLive()">退出</button>
</div>

<script>
let proxyWs=null;
let audioCtx=null;
let micStream=null;
let audioGate=false;
let proxyReady=false;

async function startLive(){
 try{
   updateStatus('申请麦克风...');
   micStream=await navigator.mediaDevices.getUserMedia({
      audio:{
        echoCancellation:true,
        noiseSuppression:true,
        autoGainControl:true
      }
   });

   initAudioPipeline();
   await connectProxy();
 }catch(e){
   alert('启动失败:'+e.message);
 }
}

function updateStatus(t){document.getElementById('status').textContent=t;}

function connectProxy(){
 return new Promise((resolve,reject)=>{
   proxyWs=new WebSocket('wss://ast-proxy.onrender.com/ast');

   proxyWs.onopen=()=>{
      updateStatus('连接翻译服务...');
      proxyWs.send(JSON.stringify({type:'start'}));
   };

   proxyWs.onmessage=(e)=>{
      const msg=JSON.parse(e.data);

      if(msg.type==='ready'){
          proxyReady=true;
          audioGate=true;
          updateStatus('正在听...');
          resolve();
      }

      if(msg.type==='asr'){
          handleResult(msg.lang,msg.text);
      }
   };

   proxyWs.onerror=reject;
 });
}

function initAudioPipeline(){
 if(audioCtx) return;

 audioCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:16000});

 const src=audioCtx.createMediaStreamSource(micStream);
 const proc=audioCtx.createScriptProcessor(4096,1,1);

 proc.onaudioprocess=(e)=>{
   if(!audioGate||!proxyReady) return;

   const f32=e.inputBuffer.getChannelData(0);
   const i16=new Int16Array(f32.length);

   for(let i=0;i<f32.length;i++){
      const v=Math.max(-1,Math.min(1,f32[i]));
      i16[i]=v<0?Math.ceil(v*32768):Math.floor(v*32767);
   }

   if(proxyWs&&proxyWs.readyState===1){
      proxyWs.send(i16.buffer);
   }
 };

 src.connect(proc);
 proc.connect(audioCtx.destination);
}

async function handleResult(lang,text){
 if(!text) return;

 audioGate=false;
 updateStatus('翻译中...');

 const translation='[请接入现有 translateOnce()] '+text;

 const wrap=document.createElement('div');
 wrap.className='item';
 wrap.innerHTML=`<div class="src">${text}</div><div class="dst">${translation}</div>`;
 document.getElementById('subtitles').appendChild(wrap);

 const u=new SpeechSynthesisUtterance(translation);
 u.lang=lang==='zh'?'id-ID':'zh-CN';

 u.onend=()=>{
    audioGate=true;
    updateStatus('正在听...');
 };

 speechSynthesis.cancel();
 speechSynthesis.speak(u);
}

function exitLive(){
 try{
   audioGate=false;
   if(proxyWs&&proxyWs.readyState===1){
      proxyWs.send(JSON.stringify({type:'stop'}));
      proxyWs.close();
   }
   if(audioCtx) audioCtx.close();
   if(micStream) micStream.getTracks().forEach(t=>t.stop());
 }catch(e){}
 history.back();
}

function cycleFont(){}

window.addEventListener('beforeunload',exitLive);
window.onload=startLive;
</script>
</body>
</html>
