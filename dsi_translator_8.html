<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DSI翻译">
  <title>DSI中印翻译小助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f6fa;
      --white: #ffffff;
      --primary: #1a6ef5;
      --primary-light: #e8f0fe;
      --text-main: #1a1a2e;
      --text-muted: #8a8fa8;
      --border: #e8eaf0;
      --live-green: #00c48c;
      --red: #ff4d4f;
      --header-h: 56px;
      --input-h: 96px;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Noto Sans SC', sans-serif;
      color: var(--text-main);
    }

    /* HEADER */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    }
    #header-logo {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #header-logo svg {
      width: 20px; height: 20px;
      fill: none; stroke: white;
      stroke-width: 2; stroke-linecap: round;
    }
    #header-title {
      flex: 1;
      font-size: 16px; font-weight: 700;
      color: var(--text-main); letter-spacing: -.2px;
    }

    /* Live 电话按钮（右上角） */
    #live-phone-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all .2s;
      touch-action: manipulation;
    }
    #live-phone-btn svg {
      width: 18px; height: 18px;
      stroke: var(--text-muted); stroke-width: 2;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
      transition: stroke .2s;
    }
    #live-phone-btn.active {
      background: #e6fff5;
      border-color: var(--live-green);
    }
    #live-phone-btn.active svg { stroke: var(--live-green); }

    /* TTS 开关（小圆图标，无文字） */
    #tts-toggle {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: all .2s;
    }
    #tts-toggle.on {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    #tts-toggle svg {
      width: 16px; height: 16px;
      stroke: var(--text-muted); stroke-width: 2;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
      transition: stroke .2s;
    }
    #tts-toggle.on svg { stroke: var(--primary); }
    #tts-label { display: none; }

    /* CHAT */
    #chat {
      position: fixed;
      top: var(--header-h);
      left: 0;
      right: 0;
      bottom: var(--input-h);
      overflow-y: auto;
      padding: 14px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar {
      width: 3px;
    }

    #chat::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
      border-radius: 3px;
    }

    .hint-msg {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.04);
      border-radius: 20px;
      padding: 5px 14px;
      align-self: center;
      margin: 4px 0;
    }

    .date-divider {
      align-self: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 2px 0 4px;
    }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }

    .bubble-wrap.out {
      align-self: flex-end;
      align-items: flex-end;
    }

    .bubble-wrap.in {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.55;
      word-break: break-word;
    }

    .bubble-wrap.out .bubble {
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    .bubble-wrap.in .bubble {
      background: var(--white);
      color: var(--text-main);
      border-bottom-left-radius: 5px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.07);
    }

    .bubble-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      padding: 0 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tts-play {
      cursor: pointer;
      width: 22px;
      height: 22px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .tts-play svg {
      width: 12px;
      height: 12px;
    }

    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 15px;
      background: var(--primary);
      vertical-align: -3px;
      margin-left: 1px;
      animation: blink 1s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    /* LIVE OVERLAY */
    #live-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #0d1117;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #live-overlay.active {
      display: flex;
    }

    #live-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #live-close svg {
      width: 20px;
      height: 20px;
      stroke: white;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
    }

    #live-title {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #live-status {
      font-size: 20px;
      font-weight: 700;
      color: white;
      margin-bottom: 6px;
      min-height: 28px;
      max-width: 280px;
      text-align: center;
    }

    #live-translation {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      max-width: 280px;
      text-align: center;
      min-height: 44px;
      line-height: 1.5;
    }

    #live-orb-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 28px 0;
    }

    #live-orb {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #4a9eff, #1a6ef5 60%, #0d4fc4);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;   /* 防止移动端双击缩放吞掉点击 */
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #live-orb.listening {
      animation: orb-pulse 1.2s infinite;
    }

    #live-orb.speaking {
      animation: orb-speak 0.8s infinite;
    }

    @keyframes orb-pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(26, 110, 245, 0.5);
        transform: scale(1);
      }

      50% {
        box-shadow: 0 0 0 28px rgba(26, 110, 245, 0);
        transform: scale(1.04);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(26, 110, 245, 0);
        transform: scale(1);
      }
    }

    @keyframes orb-speak {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.07)
      }
    }

    #live-orb svg {
      width: 52px;
      height: 52px;
      stroke: white;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #live-wave {
      display: flex;
      gap: 5px;
      align-items: flex-end;
      height: 32px;
    }

    .wave-bar {
      width: 4px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.2);
      transition: height .1s;
    }

    #live-state-label {
      margin-top: 10px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      height: 20px;
    }

    #live-direction {
      margin-top: 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--live-green);
      height: 20px;
      opacity: 0;
      transition: opacity .3s;
    }

    #live-direction.visible {
      opacity: 1;
    }

    /* ── INPUT AREA ─────────────────────────────────────── */
    :root { --input-h: 90px; }

    #input-area {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--input-h);
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column;
      align-items: stretch;
      padding: 0;
      z-index: 90;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.05);
    }

    /* 语音模式 */
    #voice-bar {
      display: flex;
      align-items: center;
      flex: 1;
      padding: 0 18px;
      gap: 14px;
    }

    /* 圆形 PTT 按钮 */
    #ptt-btn {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: #1a1a2e;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s, box-shadow .15s;
      touch-action: none;
      user-select: none; -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 3px 12px rgba(26,26,46,0.25);
    }
    #ptt-btn svg {
      width: 26px; height: 26px;
      stroke: white; stroke-width: 2;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
      pointer-events: none;
    }
    #ptt-btn:active, #ptt-btn.recording {
      background: var(--red);
      box-shadow: 0 0 0 8px rgba(255,77,79,0.18), 0 3px 12px rgba(255,77,79,0.3);
      transform: scale(0.96);
    }
    #ptt-btn.live-active {
      background: var(--live-green);
      box-shadow: 0 0 0 8px rgba(0,196,140,0.18), 0 3px 12px rgba(0,196,140,0.3);
    }

    /* 中间波形+状态区 */
    #bar-center {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 5px;
    }
    #bar-waves {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 24px;
    }
    .bar-wave {
      width: 4px; border-radius: 3px;
      background: var(--border);
      transition: height .1s, background .2s;
    }
    #bar-label {
      font-size: 13px; color: var(--text-muted);
      font-weight: 500;
      letter-spacing: .2px;
    }

    /* 右侧动作按钮（键盘/取消） */
    #bar-right-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all .15s;
      touch-action: manipulation;
    }
    #bar-right-btn svg {
      width: 20px; height: 20px;
      stroke: var(--text-muted); stroke-width: 2;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
      transition: stroke .15s;
    }
    #bar-right-btn.cancel-mode {
      border-color: var(--red);
      background: #fff5f5;
    }
    #bar-right-btn.cancel-mode svg { stroke: var(--red); }

    /* 文字输入模式 */
    #text-bar {
      display: flex; align-items: center;
      flex: 1; padding: 0 12px; gap: 10px;
    }
    #input-box {
      flex: 1;
      min-height: 38px; max-height: 80px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 15px; font-family: inherit;
      color: var(--text-main); background: var(--bg);
      outline: none; overflow-y: auto;
      line-height: 1.4; word-break: break-word; cursor: text;
    }
    #input-box:empty:before {
      content: attr(data-placeholder);
      color: var(--text-muted); pointer-events: none;
    }
    #input-box:focus { border-color: var(--primary); }

    .action-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .15s; background: var(--bg);
    }
    .action-btn svg {
      width: 20px; height: 20px;
      stroke: var(--text-muted); stroke-width: 2;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
    }
    .action-btn:active { transform: scale(0.92); }
    .btn-icon { display: flex; align-items: center; justify-content: center; }
    .btn-icon.hidden { display: none; }
    #right-btn.send-mode { background: var(--primary); border-color: var(--primary); }
    #right-btn.send-mode svg { stroke: white; }

    /* AI 水印 */
    #ai-watermark {
      text-align: center;
      font-size: 10px; color: var(--text-muted);
      padding: 2px 0 6px;
      opacity: .6;
    }

    /* PTT 浮动识别气泡 */
    #ptt-float {
      display: none;
      position: fixed;
      left: 14px; right: 14px;
      bottom: calc(var(--input-h) + 14px);
      background: white;
      border-radius: 20px;
      padding: 14px 18px 16px;
      box-shadow: 0 6px 28px rgba(26,110,245,0.18), 0 1px 6px rgba(0,0,0,0.08);
      border: 1.5px solid rgba(26,110,245,0.3);
      z-index: 150;
      animation: floatIn .18s ease;
    }
    #ptt-float.active { display: block; }
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #ptt-float-label {
      font-size: 11px; color: var(--primary);
      font-weight: 600; letter-spacing: .5px;
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 5px;
    }
    #ptt-float-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red); animation: blink 1s infinite;
    }
    #ptt-float-text {
      font-size: 17px; color: var(--text-main);
      line-height: 1.5; min-height: 26px; word-break: break-word;
    }
    #ptt-float-text:empty::before {
      content: '正在聆听…'; color: var(--text-muted);
    }
    #ptt-float::after {
      content: '';
      position: absolute; bottom: -9px; left: 40px;
      border: 9px solid transparent;
      border-top-color: white; border-bottom: 0;
      filter: drop-shadow(0 2px 1px rgba(26,110,245,0.1));
    }

    /* 翻译气泡下的操作按钮 */
    .bubble-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
    }
    .bub-btn {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 3px 9px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }
    .bub-btn svg {
      width: 11px; height: 11px;
      stroke: var(--text-muted);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    .bub-btn:active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
    .bub-btn:active svg { stroke: var(--primary); }
    .bub-btn.copied { background: #e6fff5; border-color: var(--live-green); color: var(--live-green); }
    .back-trans-row {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg);
      border-radius: 10px;
      padding: 7px 10px;
      margin-top: 6px;
      line-height: 1.5;
      max-width: 240px;
      border-left: 2px solid var(--border);
    }

    /* API key modal */
    #key-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
    }

    #key-modal.active {
      display: flex;
    }

    #key-card {
      background: white;
      border-radius: 16px;
      padding: 24px 20px;
      width: 320px;
      max-width: 90vw;
    }

    #key-card h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    #key-card p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    #key-input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 14px;
      outline: none;
      font-family: monospace;
      margin-bottom: 12px;
    }

    #key-input:focus {
      border-color: var(--primary);
    }

    #key-save {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- API KEY 已内置，无需弹窗 -->


  <!-- HEADER -->
  <div id="header">
    <div id="header-logo">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L4 6v6c0 5.5 3.8 9.7 8 11 4.2-1.3 8-5.5 8-11V6L12 2z"/>
        <path d="M8 12l2.5 2.5L16 9"/>
      </svg>
    </div>
    <div id="header-title">DSI 翻译助手</div>
    <div id="tts-toggle" class="on" onclick="toggleTTS()" title="自动朗读">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
      <span id="tts-label">自动朗读</span>
    </div>
    <!-- Live 电话图标（右上角） -->
    <button id="live-phone-btn" onclick="toggleLiveMode()" title="实时双语对话">
      <svg viewBox="0 0 24 24">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.9 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.81 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 5.62 5.62l.97-.97a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
    </button>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div class="date-divider">今天</div>
    <div class="hint-msg">🌐 自动识别中文↔印尼语，发送后自动朗读译文</div>
  </div>

  <!-- PTT 浮动识别气泡 -->
  <div id="ptt-float">
    <div id="ptt-float-label">
      <span id="ptt-float-dot"></span>正在识别
    </div>
    <div id="ptt-float-text"></div>
  </div>

  <!-- INPUT AREA -->
  <div id="input-area">
    <!-- 语音模式（默认） -->
    <div id="voice-bar">
      <!-- 圆形麦克风按钮 (PTT) -->
      <button id="ptt-btn"
        ontouchstart="pttStart(event);event.preventDefault();"
        ontouchcancel="pttCancel()"
        onmousedown="pttStart(event)">
        <svg viewBox="0 0 24 24">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>

      <!-- 中间：波形 + 状态标签 -->
      <div id="bar-center">
        <div id="bar-waves">
          <div class="bar-wave" style="height:6px"></div>
          <div class="bar-wave" style="height:14px"></div>
          <div class="bar-wave" style="height:8px"></div>
          <div class="bar-wave" style="height:18px"></div>
          <div class="bar-wave" style="height:10px"></div>
          <div class="bar-wave" style="height:14px"></div>
          <div class="bar-wave" style="height:6px"></div>
        </div>
        <span id="bar-label">按住说话</span>
      </div>

      <!-- 右侧：键盘切换 / 取消 -->
      <button id="bar-right-btn" onclick="barRightAction()" title="文字输入">
        <svg id="bar-right-icon-kb" viewBox="0 0 24 24">
          <rect x="2" y="4" width="20" height="13" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
          <line x1="7" y1="9" x2="7" y2="9" stroke-linecap="round" stroke-width="3"/>
          <line x1="12" y1="9" x2="12" y2="9" stroke-linecap="round" stroke-width="3"/>
          <line x1="17" y1="9" x2="17" y2="9" stroke-linecap="round" stroke-width="3"/>
          <line x1="7" y1="13" x2="13" y2="13"/>
        </svg>
        <svg id="bar-right-icon-x" viewBox="0 0 24 24" style="display:none">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- 文字模式 -->
    <div id="text-bar" style="display:none">
      <button class="action-btn" onclick="switchToVoice()" title="语音输入">
        <svg viewBox="0 0 24 24">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <div id="input-box" contenteditable="true" role="textbox" aria-label="输入文字翻译"
        data-placeholder="输入文字翻译…"
        onkeydown="handleKey(event)" oninput="onInputChange(this)"></div>
      <button class="action-btn" id="right-btn" onclick="sendMessage()" title="发送">
        <span class="btn-icon" id="send-icon-wrap">
          <svg viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </span>
      </button>
    </div>

    <div id="ai-watermark">内容由 AI 生成</div>
  </div>

  <script>
    // -- CONFIG（全部内置，无需人工输入）--
    // 机器翻译 MT：豆包翻译大模型（火山引擎 Ark responses 接口）
    const API_URL = 'https://ark.cn-beijing.volces.com/api/v3/responses';
    const MODEL = 'doubao-seed-translation-250915';
    const ARK_TRANSLATE_KEY = 'ark-cf33cf52-7da4-4e6f-9e93-5d78e422644d-9ee6f';

    // AST 代理（同声传译 2.0 WebSocket 代理，解决浏览器无法设请求头的限制）
    const PROXY_WS_URL = 'wss://ast-proxy.onrender.com/ast';

    // -- MIC HELPERS --
    // 根治"重复申请麦克风"：整页只调用一次 getUserMedia，并保留该音频流不关闭，
    // 让浏览器记住授权；之后两个 SpeechRecognition 复用已授权状态，不会再弹窗。
    // 重要前提：必须用 http(s):// 或 localhost 打开本页。若用 file:// 双击打开，
    // Chrome 会把它当临时来源、不记忆麦克风授权，将导致每次都重新弹窗（任何代码都无法规避）。
    let micPermissionGranted = false;
    let micStream = null;

    async function ensureMicPermission() {
      if (micPermissionGranted && micStream) return true;
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return true;
      try {
        // 只申请一次，保留 stream 维持授权（不调用 stop()）
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micPermissionGranted = true;
        return true;
      } catch (e) {
        const denied = e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError';
        alert(denied
          ? '麦克风权限被拒绝。请点击地址栏锁形图标开启麦克风权限后刷新；并确认是用 http(s):// 或 localhost 打开（file:// 无法保存授权）。'
          : '无法访问麦克风：' + e.message);
        return false;
      }
    }

    // 将 SpeechRecognition 错误码转换为用户可读的提示
    function showSpeechError(code) {
      const map = {
        'network': '语音识别网络错误\n\n安卓 Chrome 的语音识别需要连接谷歌服务器。\n如在中国大陆使用，请开启 VPN 后重试，或改用文字输入。',
        'not-allowed': '麦克风权限被拒绝，请在浏览器设置中开启麦克风权限后刷新页面',
        'audio-capture': '未检测到麦克风，请检查设备硬件或浏览器权限',
        'service-not-allowed': '此浏览器不允许使用语音识别，请尝试 Chrome 或 Samsung Internet',
        'aborted': null,
        'no-speech': null,
      };
      const msg = map[code];
      if (msg) alert(msg);
    }

    let apiKey = ARK_TRANSLATE_KEY;   // 翻译 Key 已内置
    let ttsOn = true;
    let lastSpeechLang = 'zh-CN'; // 保留（detectLang 仍在使用）
    let waveTick;
    let typing = false;

    // -- INIT --
    window.onload = () => {
      // Key 已内置，无需任何输入弹窗
      // 非安全上下文（file:// 直接打开）下，麦克风授权无法被记住 → 会反复弹窗，给出提示
      if (!window.isSecureContext) {
        const tip = document.createElement('div');
        tip.className = 'hint-msg';
        tip.style.color = 'var(--red)';
        tip.textContent = '⚠️ 检测到非安全上下文（file://）。请用 http(s):// 或 localhost 打开本页，否则麦克风会反复弹窗。';
        document.getElementById('chat').appendChild(tip);
      }
    };

    // 长按 header 的彩蛋已移除（无需重置 Key）
    function resetKey() {}
    function saveKey() {}

    // -- TTS --
    // 移动端 speechSynthesis 需在真实手势内先调用一次才能解锁，后续异步才能正常朗读
    let speechUnlocked = false;
    function unlockSpeech() {
      if (speechUnlocked || !('speechSynthesis' in window)) return;
      speechUnlocked = true;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
    }
    document.addEventListener('touchstart', unlockSpeech, { once: true, passive: true });
    document.addEventListener('mousedown', unlockSpeech, { once: true });

    function toggleTTS() {
      ttsOn = !ttsOn;
      document.getElementById('tts-toggle').classList.toggle('on', ttsOn);
      document.getElementById('tts-label').textContent = ttsOn ? '自动朗读' : '朗读关';
    }
    function detectLang(text) {
      const value = (text || '').trim();
      if (!value) return 'zh';
      return /[\u4e00-\u9fff]/.test(value) ? 'zh' : 'id';
    }
    function detectSpeechLocale(text) {
      return detectLang(text) === 'zh' ? 'zh-CN' : 'id-ID';
    }
    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = detectSpeechLocale(text);
      u.rate = 1.0;
      window.speechSynthesis.speak(u);
    }

    // -- INPUT MORPH --
    function onInputChange(el) {
      const hasText = el.innerText.trim().length > 0;
      if (hasText !== typing) { typing = hasText; setMorphState(typing); }
    }
    function setMorphState(isTyping) {
      document.getElementById('live-icon-wrap').classList.toggle('hidden', isTyping);
      document.getElementById('send-icon-wrap').classList.toggle('hidden', !isTyping);
      document.getElementById('right-btn').classList.toggle('send-mode', isTyping);
    }
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }
    function rightBtnClick() { sendMessage(); }

    // -- MODE SWITCH --
    function switchToVoice() {
      document.getElementById('voice-bar').style.display = 'flex';
      document.getElementById('text-bar').style.display = 'none';
    }
    function switchToText() {
      document.getElementById('voice-bar').style.display = 'none';
      document.getElementById('text-bar').style.display = 'flex';
      setTimeout(() => document.getElementById('input-box').focus(), 50);
    }

    // -- BUBBLE --
    function addBubble(text, dir, streaming = false) {
      const chat = document.getElementById('chat');
      const wrap = document.createElement('div');
      wrap.className = `bubble-wrap ${dir}`;
      const b = document.createElement('div');
      b.className = 'bubble';
      if (streaming) { b.innerHTML = '<span class="cursor-blink"></span>'; }
      else { b.textContent = text; }
      wrap.appendChild(b);

      const meta = document.createElement('div');
      meta.className = 'bubble-meta';
      if (dir === 'in') {
        // ▶ 朗读
        const ttsBtn = document.createElement('div');
        ttsBtn.className = 'tts-play'; ttsBtn.title = '朗读';
        ttsBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
        ttsBtn.onclick = () => speak(b.textContent);
        meta.appendChild(ttsBtn);

        // ⧉ 复制（纯图标）
        const copyBtn = document.createElement('div');
        copyBtn.className = 'tts-play'; copyBtn.title = '复制';
        const copyIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
        const doneIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
        copyBtn.innerHTML = copyIcon;
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(b.textContent).then(() => {
            copyBtn.innerHTML = doneIcon;
            copyBtn.style.borderColor = 'var(--live-green)';
            setTimeout(() => { copyBtn.innerHTML = copyIcon; copyBtn.style.borderColor = ''; }, 2000);
          }).catch(() => alert('复制失败，请长按文字手动复制'));
        };
        meta.appendChild(copyBtn);

        // ⇄ 回译（纯图标）
        const verifyBtn = document.createElement('div');
        verifyBtn.className = 'tts-play'; verifyBtn.title = '回译核对';
        const verifyIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.37"/></svg>`;
        verifyBtn.innerHTML = verifyIcon;
        let backRow = null;
        verifyBtn.onclick = async () => {
          if (backRow) { backRow.remove(); backRow = null; verifyBtn.style.borderColor = ''; return; }
          verifyBtn.style.opacity = '0.5';
          const result = await translateOnce(b.textContent);
          verifyBtn.style.opacity = '';
          verifyBtn.style.borderColor = 'var(--primary)';
          backRow = document.createElement('div');
          backRow.className = 'back-trans-row';
          backRow.textContent = result;
          wrap.appendChild(backRow);
          chat.scrollTop = chat.scrollHeight;
        };
        meta.appendChild(verifyBtn);
      }
      const t = document.createElement('span');
      t.textContent = new Date().toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
      meta.appendChild(t);
      wrap.appendChild(meta);

      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
      return b;
    }

    // -- SEND --
    async function sendMessage() {
      const box = document.getElementById('input-box');
      const text = box.innerText.trim();
      if (!text) return;
      box.innerText = '';
      typing = false; setMorphState(false);
      addBubble(text, 'out');
      await streamTranslation(text);
    }

    // -- BUILD DOUBAO REQUEST BODY --
    // 翻译方向完全由识别/输入文本的语种决定，只存在 中→印 与 印→中 两种
    function buildDoubaoBody(text) {
      const isZh = detectLang(text) === 'zh';
      return {
        model: MODEL,
        input: [{
          role: 'user',
          content: [{
            type: 'input_text',
            text: text,
            translation_options: {
              source_language: isZh ? 'zh' : 'id',
              target_language: isZh ? 'id' : 'zh'
            }
          }]
        }]
      };
    }

    // -- EXTRACT TEXT FROM DOUBAO RESPONSE --
    function extractDoubaoText(data) {
      const output = data?.output;
      if (Array.isArray(output)) {
        for (const item of output) {
          const content = item?.content;
          if (Array.isArray(content)) {
            for (const c of content) {
              if (c?.type === 'output_text' && c?.text) return c.text;
            }
          }
          if (typeof item?.content === 'string' && item.content) return item.content;
        }
      }
      return null;
    }

    // -- TRANSLATE (Doubao responses API) --
    async function streamTranslation(userText, srcLang) {
      if (!apiKey) {
        addBubble('⚠️ 请先设置 API Key（长按左上角图标可重置）', 'in');
        return '';
      }
      const bubble = addBubble('', 'in', true);
      let result = '';
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify(buildDoubaoBody(userText))
        });
        if (!res.ok) { const err = await res.text(); throw new Error(err); }
        const data = await res.json();
        result = extractDoubaoText(data) || '⚠️ 翻译失败';
        bubble.textContent = result;
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
      } catch (err) {
        result = '⚠️ 请求失败：' + (err.message || '网络错误');
        bubble.textContent = result;
      }
      if (!result) { result = '…'; bubble.textContent = result; }
      if (ttsOn && !result.startsWith('⚠️')) {
        // 用 srcLang（识别语言）的反向确定 TTS 语言，避免短译文误判
        // srcLang='zh'→译文是印尼语→用 id-ID；srcLang='id'→译文是中文→用 zh-CN
        const ttsLang = srcLang === 'zh' ? 'id-ID'
                      : srcLang === 'id' ? 'zh-CN'
                      : detectSpeechLocale(result);   // 兜底：从译文推断
        const u = new SpeechSynthesisUtterance(result);
        u.lang = ttsLang; u.rate = 1.0;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
      }
      return result;
    }

    // -- NON-STREAM (for Live mode) --
    async function translateOnce(text) {
      if (!apiKey) return '⚠️ 请先设置 API Key';
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify(buildDoubaoBody(text))
        });
        const data = await res.json();
        return extractDoubaoText(data) || '⚠️ 翻译失败';
      } catch (e) { return '⚠️ 网络错误，请重试'; }
    }

    // ============================================================
    // AST 音频采集与代理通信模块
    // 流程：getUserMedia → AudioContext(16kHz) → ScriptProcessor
    //       → Int16 PCM → WebSocket → 代理 → 两路 AST 并行识别
    //       → 按文本长度判定语种 → 返回 {type:'asr', lang, text}
    // ============================================================
    const PROXY_RECONNECT_DELAY = 2000;

    let audioCtx    = null;   // AudioContext @ 16kHz
    let audioProc   = null;   // ScriptProcessorNode
    let audioSrc    = null;   // MediaStreamAudioSourceNode
    let proxyWs     = null;   // WebSocket → ast-proxy
    let proxyReady  = false;  // 两路 AST session 均已就绪
    let audioGate   = false;  // 控制是否实际发送音频到代理

    // 全局 ASR 结果回调（PTT / Live 各自设置）
    let onASRResult   = null; // (lang:'zh'|'id', text:string) => void
    let onASRPartial  = null; // (text:string) => void

    // 启动代理 WebSocket + 音频采集
    // 每次都等待 {type:'ready'} 再 resolve（不管 WS 是否已连接）
    // 这样 PTT → Live 切换时新 AST 会话必须就绪才开始发音频
    function connectProxy() {
      return new Promise((resolve, reject) => {
        proxyReady = false;
        const connTimeout = setTimeout(
          () => reject(new Error('代理连接超时（服务器正在唤醒，请稍后重试）')), 90000);

        // 统一消息处理器（每次重新注册，确保回调指向最新的 onASRResult/onASRPartial）
        function handleMsg({ data }) {
          let msg; try { msg = JSON.parse(data); } catch(e) { return; }
          if (msg.type === 'connecting') {
            // 连接提示——根据当前模式更新不同的 UI 区域
            if (liveActive) {
              document.getElementById('live-translation').textContent = '连接中，请稍候…';
            } else {
              document.getElementById('ptt-float-label').innerHTML =
                '<span id="ptt-float-dot"></span>连接 AST 中…';
            }
          } else if (msg.type === 'ready') {
            clearTimeout(connTimeout);
            proxyReady = true;
            startAudioPipeline();
            resolve();
          } else if (msg.type === 'partial') {
            onASRPartial && onASRPartial(msg.text);
          } else if (msg.type === 'asr') {
            onASRResult && onASRResult(msg.lang, msg.text);
          } else if (msg.type === 'silence') {
            /* 静音，继续等待 */
          } else if (msg.type === 'error') {
            clearTimeout(connTimeout);
            console.error('[AST] Proxy error:', msg.message);
            reject(new Error(msg.message));
          }
        }

        if (proxyWs && proxyWs.readyState === WebSocket.OPEN) {
          // WS 已连接：重新注册处理器，发 start，等 ready（不立即 resolve）
          proxyWs.onmessage = handleMsg;
          proxyWs.send(JSON.stringify({ type: 'start' }));
        } else {
          // 新建连接
          proxyWs = new WebSocket(PROXY_WS_URL);
          proxyWs.onopen  = () => {
            console.log('[AST] Proxy WS open → sending start');
            proxyWs.send(JSON.stringify({ type: 'start' }));
          };
          proxyWs.onmessage = handleMsg;
          proxyWs.onerror   = () => {
            clearTimeout(connTimeout);
            reject(new Error('代理 WebSocket 连接失败，请检查网络或代理服务状态'));
          };
          proxyWs.onclose   = () => { proxyReady = false; audioGate = false; };
        }
      });
    }

    // 启动 16kHz 音频管道（幂等）
    function startAudioPipeline() {
      if (audioCtx || !micStream) return;
      audioCtx  = new AudioContext({ sampleRate: 16000 });
      audioSrc  = audioCtx.createMediaStreamSource(micStream);
      // bufferSize=4096 → ~256ms/包，满足 AST "建议80ms"的几倍，实际延迟可接受
      audioProc = audioCtx.createScriptProcessor(4096, 1, 1);

      audioProc.onaudioprocess = e => {
        if (!audioGate || !proxyReady) return;
        if (proxyWs?.readyState !== WebSocket.OPEN) return;
        const f32 = e.inputBuffer.getChannelData(0);
        const i16 = new Int16Array(f32.length);
        for (let k = 0; k < f32.length; k++) {
          const v = Math.max(-1, Math.min(1, f32[k]));
          i16[k] = v < 0 ? Math.ceil(v * 32768) : Math.floor(v * 32767);
        }
        proxyWs.send(i16.buffer);
      };

      audioSrc.connect(audioProc);
      audioProc.connect(audioCtx.destination);
      console.log('[AST] Audio pipeline @ 16kHz started');
    }

    // 关闭音频管道（页面关闭时或彻底停止时调用）
    function closeAudioPipeline() {
      audioGate = false;
      audioProc?.disconnect(); audioProc = null;
      audioSrc?.disconnect();  audioSrc  = null;
      audioCtx?.close();       audioCtx  = null;
    }

    // ── 底部波形动画控制 ─────────────────────────────────────
    let barWaveTick = null;

    function setBarState(state, label) {
      // state: 'idle' | 'listening' | 'live' | 'thinking'
      const bars = document.querySelectorAll('.bar-wave');
      const lbl  = document.getElementById('bar-label');
      const pttBtn = document.getElementById('ptt-btn');
      const rightBtn = document.getElementById('bar-right-btn');
      const kbIcon = document.getElementById('bar-right-icon-kb');
      const xIcon  = document.getElementById('bar-right-icon-x');
      clearInterval(barWaveTick);

      lbl.textContent = label || '按住说话';

      if (state === 'idle') {
        bars.forEach((b, i) => { b.style.height = [6,14,8,18,10,14,6][i]+'px'; b.style.background = 'var(--border)'; });
        pttBtn.classList.remove('recording', 'live-active');
        rightBtn.classList.remove('cancel-mode');
        kbIcon.style.display = ''; xIcon.style.display = 'none';
      } else if (state === 'listening') {
        pttBtn.classList.add('recording'); pttBtn.classList.remove('live-active');
        rightBtn.classList.add('cancel-mode');
        kbIcon.style.display = 'none'; xIcon.style.display = '';
        barWaveTick = setInterval(() => {
          bars.forEach(b => { b.style.height = Math.random()*20+4+'px'; b.style.background = 'var(--primary)'; });
        }, 100);
      } else if (state === 'live') {
        pttBtn.classList.add('live-active'); pttBtn.classList.remove('recording');
        rightBtn.classList.add('cancel-mode');
        kbIcon.style.display = 'none'; xIcon.style.display = '';
        barWaveTick = setInterval(() => {
          bars.forEach(b => { b.style.height = Math.random()*18+4+'px'; b.style.background = 'var(--live-green)'; });
        }, 110);
      } else if (state === 'thinking') {
        pttBtn.classList.remove('recording', 'live-active');
        bars.forEach(b => { b.style.height = '8px'; b.style.background = 'var(--text-muted)'; });
      }
    }

    function barRightAction() {
      if (pttActive) { pttCancel(); return; }
      if (liveActive) { stopLiveMode(); return; }
      switchToText();
    }

    // ── PTT 按住说话 ──────────────────────────────────────────
    let pttActive = false;
    let pttResultPending = false;

    function showPttFloat(label = '正在识别 · 中文 / Indonesia') {
      document.getElementById('ptt-float-text').textContent = '';
      document.getElementById('ptt-float-label').innerHTML =
        `<span id="ptt-float-dot"></span>${label}`;
      document.getElementById('ptt-float').classList.add('active');
      setBarState('listening', '正在听…');
    }

    function hidePttFloat() {
      document.getElementById('ptt-float').classList.remove('active');
      setBarState('idle', '按住说话');
    }

    async function pttStart(e) {
      e.preventDefault();
      if (pttActive) return;
      if (!await ensureMicPermission()) return;

      pttActive = true;
      pttResultPending = false;
      showPttFloat('连接中… 请稍候');

      // ASR 结果回调：收到即完成本次 PTT
      // 修复 TTS：用 ASR 返回的 srcLang 直接决定 TTS 语言，避免短译文误判
      onASRResult = (lang, text) => {
        if (!pttActive) return;
        pttActive = false; pttResultPending = false; audioGate = false;
        hidePttFloat();
        if (text && text.trim()) {
          addBubble(text, 'out');
          streamTranslation(text, lang);   // ← 传入 srcLang
        }
      };
      onASRPartial = text => {
        document.getElementById('ptt-float-text').textContent = text;
      };

      try {
        await connectProxy();
        showPttFloat(); // 更新标签为"正在识别"
        audioGate = true;
      } catch(err) {
        pttActive = false;
        hidePttFloat();
        alert('AST 连接失败：' + err.message);
      }

      // 松手处理（全局绑定一次）
      if (!window._pttUpBound) {
        window._pttUpBound = true;
        const onUp = () => {
          if (!pttActive) return;
          const t = document.getElementById('ptt-float-text');
          t.textContent = (t.textContent || '') + ' ✓';
          audioGate = false;
          pttResultPending = true;
          if (proxyWs?.readyState === WebSocket.OPEN)
            proxyWs.send(JSON.stringify({ type: 'end' }));
          // 5s 无结果则超时取消
          setTimeout(() => { if (pttResultPending) { pttActive=false; pttResultPending=false; hidePttFloat(); } }, 5000);
        };
        document.addEventListener('touchend', onUp, { capture: true, passive: true });
        document.addEventListener('mouseup',  onUp, { capture: true });
      }
    }

    function pttCancel() {
      if (!pttActive) return;
      pttActive = false; pttResultPending = false; audioGate = false;
      hidePttFloat();
      if (proxyWs?.readyState === WebSocket.OPEN)
        proxyWs.send(JSON.stringify({ type: 'stop' }));
    }

    // -- LIVE MODE --
    // ── LIVE 模式（电话图标驱动） ────────────────────────────
    function toggleLiveMode() {
      if (liveActive) { stopLiveMode(); } else { startLiveMode(); }
    }

    async function startLiveMode() {
      if (pttActive) return;           // PTT 正在用，不同时开 Live
      if (!await ensureMicPermission()) return;

      // 电话图标变绿
      document.getElementById('live-phone-btn').classList.add('active');
      liveActive = true;
      setBarState('live', '正在聆听…');
      addBubble('⚡ 实时双语对话已开启', 'in', false);

      onASRResult = (lang, text) => {
        if (!liveActive) return;
        handleLiveResult(lang, text);
      };
      onASRPartial = text => {
        document.getElementById('bar-label').textContent = text || '正在聆听…';
      };

      try {
        await connectProxy();
        audioGate = true;
        setBarState('live', '正在聆听…');
      } catch(err) {
        stopLiveMode();
        addBubble('⚠️ ' + err.message, 'in', false);
      }
    }

    function stopLiveMode() {
      liveActive = false; audioGate = false;
      document.getElementById('live-phone-btn').classList.remove('active');
      if (proxyWs?.readyState === WebSocket.OPEN)
        proxyWs.send(JSON.stringify({ type: 'stop' }));
      window.speechSynthesis && window.speechSynthesis.cancel();
      setBarState('idle', '按住说话');
    }

    // 处理 Live 每条 ASR 结果：翻译 → TTS → 继续聆听
    async function handleLiveResult(lang, text) {
      if (!liveActive || !text.trim()) return;
      audioGate = false;
      setBarState('thinking', '翻译中…');
      addBubble(text, 'out');

      const translation = await translateOnce(text);
      addBubble(translation, 'in');

      if (translation.startsWith('⚠️')) {
        if (liveActive) { setBarState('live', '正在聆听…'); audioGate = true; }
        return;
      }

      setBarState('live', '正在播报…');
      const ttsLang = lang === 'zh' ? 'id-ID' : 'zh-CN';
      const u = new SpeechSynthesisUtterance(translation);
      u.lang = ttsLang; u.rate = 1.0;
      u.onend = () => {
        if (liveActive) { setBarState('live', '正在聆听…'); audioGate = true; }
      };
      window.speechSynthesis.speak(u);
    }

    // 兼容旧代码引用
    function openLive()  { startLiveMode(); }
    function closeLive() { stopLiveMode();  }
    function setLiveDirection(t) {}   // no-op, direction shown in bubble
  </script>
</body>
