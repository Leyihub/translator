<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DSI翻译">
  <title>DSI中印翻译小助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f6fa;
      --white: #ffffff;
      --primary: #1a6ef5;
      --primary-light: #e8f0fe;
      --text-main: #1a1a2e;
      --text-muted: #8a8fa8;
      --border: #e8eaf0;
      --live-green: #00c48c;
      --red: #ff4d4f;
      --header-h: 56px;
      --input-h: 64px;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Noto Sans SC', sans-serif;
      color: var(--text-main);
    }

    /* HEADER */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.06);
    }

    #header-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #header-logo svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
    }

    #header-title {
      flex: 1;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -.2px;
    }

    #tts-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg);
      user-select: none;
      transition: all .2s;
    }

    #tts-toggle.on {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    #tts-toggle svg {
      width: 14px;
      height: 14px;
    }

    #tts-label {
      white-space: nowrap;
      font-weight: 500;
    }

    /* CHAT */
    #chat {
      position: fixed;
      top: var(--header-h);
      left: 0;
      right: 0;
      bottom: var(--input-h);
      overflow-y: auto;
      padding: 14px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar {
      width: 3px;
    }

    #chat::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
      border-radius: 3px;
    }

    .hint-msg {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.04);
      border-radius: 20px;
      padding: 5px 14px;
      align-self: center;
      margin: 4px 0;
    }

    .date-divider {
      align-self: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 2px 0 4px;
    }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }

    .bubble-wrap.out {
      align-self: flex-end;
      align-items: flex-end;
    }

    .bubble-wrap.in {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.55;
      word-break: break-word;
    }

    .bubble-wrap.out .bubble {
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    .bubble-wrap.in .bubble {
      background: var(--white);
      color: var(--text-main);
      border-bottom-left-radius: 5px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.07);
    }

    .bubble-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      padding: 0 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tts-play {
      cursor: pointer;
      width: 22px;
      height: 22px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .tts-play svg {
      width: 12px;
      height: 12px;
    }

    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 15px;
      background: var(--primary);
      vertical-align: -3px;
      margin-left: 1px;
      animation: blink 1s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    /* LIVE OVERLAY */
    #live-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #0d1117;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #live-overlay.active {
      display: flex;
    }

    #live-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #live-close svg {
      width: 20px;
      height: 20px;
      stroke: white;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
    }

    #live-title {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #live-status {
      font-size: 20px;
      font-weight: 700;
      color: white;
      margin-bottom: 6px;
      min-height: 28px;
      max-width: 280px;
      text-align: center;
    }

    #live-translation {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      max-width: 280px;
      text-align: center;
      min-height: 44px;
      line-height: 1.5;
    }

    #live-orb-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 28px 0;
    }

    #live-orb {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #4a9eff, #1a6ef5 60%, #0d4fc4);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #live-orb.listening {
      animation: orb-pulse 1.2s infinite;
    }

    #live-orb.speaking {
      animation: orb-speak 0.8s infinite;
    }

    @keyframes orb-pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(26, 110, 245, 0.5);
        transform: scale(1);
      }

      50% {
        box-shadow: 0 0 0 28px rgba(26, 110, 245, 0);
        transform: scale(1.04);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(26, 110, 245, 0);
        transform: scale(1);
      }
    }

    @keyframes orb-speak {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.07)
      }
    }

    #live-orb svg {
      width: 52px;
      height: 52px;
      stroke: white;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #live-wave {
      display: flex;
      gap: 5px;
      align-items: flex-end;
      height: 32px;
    }

    .wave-bar {
      width: 4px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.2);
      transition: height .1s;
    }

    #live-state-label {
      margin-top: 10px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      height: 20px;
    }

    #live-lang-row {
      display: flex;
      gap: 14px;
      margin-top: 24px;
      align-items: center;
    }

    .live-lang-chip {
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.45);
    }

    .live-lang-chip.active {
      border-color: var(--live-green);
      color: var(--live-green);
      background: rgba(0, 196, 140, 0.1);
    }

    /* INPUT AREA */
    #input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--input-h);
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 8px;
    }

    #input-box {
      flex: 1;
      min-height: 38px;
      max-height: 90px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text-main);
      background: var(--bg);
      outline: none;
      overflow-y: auto;
      line-height: 1.4;
      word-break: break-word;
      cursor: text;
    }

    #input-box:empty:before {
      content: attr(data-placeholder);
      color: var(--text-muted);
      pointer-events: none;
    }

    #input-box:focus {
      border-color: var(--primary);
    }

    .action-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .15s;
      background: var(--bg);
    }

    .action-btn svg {
      width: 20px;
      height: 20px;
      stroke: var(--text-muted);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .action-btn:active {
      transform: scale(0.92);
    }

    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon.hidden {
      display: none;
    }

    #mic-btn.recording {
      background: #fff0f0;
      border-color: var(--red);
    }

    #mic-btn.recording svg {
      stroke: var(--red);
    }

    #live-btn.send-mode {
      background: var(--primary);
      border-color: var(--primary);
    }

    #live-btn.send-mode svg {
      stroke: white;
    }

    /* API key modal */
    #key-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
    }

    #key-modal.active {
      display: flex;
    }

    #key-card {
      background: white;
      border-radius: 16px;
      padding: 24px 20px;
      width: 320px;
      max-width: 90vw;
    }

    #key-card h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    #key-card p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    #key-input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 14px;
      outline: none;
      font-family: monospace;
      margin-bottom: 12px;
    }

    #key-input:focus {
      border-color: var(--primary);
    }

    #key-save {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- API KEY MODAL（已内置 Key，弹窗禁用） -->
  <div id="key-modal" style="display:none!important"></div>

  <!-- HEADER -->
  <div id="header">
    <div id="header-logo">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L4 6v6c0 5.5 3.8 9.7 8 11 4.2-1.3 8-5.5 8-11V6L12 2z" />
        <path d="M8 12l2.5 2.5L16 9" />
      </svg>
    </div>
    <div id="header-title">DSI中印翻译小助手</div>
    <div id="tts-toggle" class="on" onclick="toggleTTS()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
      </svg>
      <span id="tts-label">自动朗读</span>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div class="date-divider">今天</div>
    <div class="hint-msg">🌐 自动识别中文↔印尼语，发送后自动朗读译文</div>
  </div>

  <!-- INPUT AREA -->
  <div id="input-area">
    <div id="input-box" contenteditable="true" role="textbox" aria-label="输入文字翻译" data-placeholder="输入文字翻译…"
      onkeydown="handleKey(event)" oninput="onInputChange(this)"></div>
    <button class="action-btn" id="mic-btn" onclick="micOrSend()" title="语音输入">
      <span class="btn-icon" id="mic-icon-wrap">
        <svg viewBox="0 0 24 24">
          <rect x="9" y="2" width="6" height="12" rx="3" />
          <path d="M5 10a7 7 0 0 0 14 0" />
          <line x1="12" y1="19" x2="12" y2="23" />
          <line x1="8" y1="23" x2="16" y2="23" />
        </svg>
      </span>
    </button>
    <button class="action-btn" id="live-btn" onclick="liveOrSend()" title="Live实时对话 / 发送">
      <span class="btn-icon" id="live-icon-wrap">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3" />
          <path d="M6.3 6.3a8 8 0 0 0 0 11.4" />
          <path d="M17.7 6.3a8 8 0 0 1 0 11.4" />
          <path d="M3.5 3.5a14 14 0 0 0 0 17" />
          <path d="M20.5 3.5a14 14 0 0 1 0 17" />
        </svg>
      </span>
      <span class="btn-icon hidden" id="send-icon-wrap">
        <svg viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </span>
    </button>
  </div>

  <!-- LIVE OVERLAY -->
  <div id="live-overlay">
    <button id="live-close" onclick="closeLive()">
      <svg viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
    <div id="live-title">LIVE 实时翻译</div>
    <div id="live-status">准备就绪</div>
    <div id="live-translation">点击下方球体开始对话</div>
    <div id="live-orb-wrap">
      <div id="live-orb" onclick="toggleLiveListen()">
        <svg viewBox="0 0 24 24">
          <rect x="9" y="2" width="6" height="12" rx="3" />
          <path d="M5 10a7 7 0 0 0 14 0" />
          <line x1="12" y1="19" x2="12" y2="23" />
          <line x1="8" y1="23" x2="16" y2="23" />
        </svg>
      </div>
    </div>
    <div id="live-wave">
      <div class="wave-bar" style="height:5px"></div>
      <div class="wave-bar" style="height:10px"></div>
      <div class="wave-bar" style="height:7px"></div>
      <div class="wave-bar" style="height:16px"></div>
      <div class="wave-bar" style="height:9px"></div>
      <div class="wave-bar" style="height:13px"></div>
      <div class="wave-bar" style="height:5px"></div>
    </div>
    <div id="live-state-label">点击麦克风开始</div>
    <div id="live-lang-row">
      <div class="live-lang-chip" id="chip-zh">中文</div>
      <div style="color:rgba(255,255,255,0.3);font-size:16px">⇄</div>
      <div class="live-lang-chip" id="chip-id">Indonesia</div>
    </div>
  </div>

  <script>
    // ── CONFIG ──
    const API_URL = 'https://ark.cn-beijing.volces.com/api/v3/responses';
    const MODEL = 'doubao-seed-translation-250915';

    const apiKey = 'ark-203244c4-ad44-4b46-8017-0b056c4662b4-5730c';
    let ttsOn = true;
    let recog = null;
    let micActive = false;
    let liveRecog = null;
    let liveActive = false;
    let waveTick;
    let typing = false;

    // ── INIT ──
    window.onload = () => { /* API Key 已内置，无需录入 */ };

    // ── TTS ──
    function toggleTTS() {
      ttsOn = !ttsOn;
      document.getElementById('tts-toggle').classList.toggle('on', ttsOn);
      document.getElementById('tts-label').textContent = ttsOn ? '自动朗读' : '朗读关';
    }
    function detectLang(text) { return /[\u4e00-\u9fff]/.test(text) ? 'zh' : 'id'; }
    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = detectLang(text) === 'zh' ? 'zh-CN' : 'id-ID';
      u.rate = 1.0;
      window.speechSynthesis.speak(u);
    }

    // ── INPUT MORPH ──
    function onInputChange(el) {
      const hasText = el.innerText.trim().length > 0;
      if (hasText !== typing) { typing = hasText; setMorphState(typing); }
    }
    function setMorphState(isTyping) {
      document.getElementById('live-icon-wrap').classList.toggle('hidden', isTyping);
      document.getElementById('send-icon-wrap').classList.toggle('hidden', !isTyping);
      document.getElementById('live-btn').classList.toggle('send-mode', isTyping);
    }
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }
    function micOrSend() { toggleVoiceInput(); }
    function liveOrSend() { if (typing) { sendMessage(); } else { openLive(); } }

    // ── BUBBLE ──
    function addBubble(text, dir, streaming = false) {
      const chat = document.getElementById('chat');
      const wrap = document.createElement('div');
      wrap.className = `bubble-wrap ${dir}`;
      const b = document.createElement('div');
      b.className = 'bubble';
      if (streaming) { b.innerHTML = '<span class="cursor-blink"></span>'; }
      else { b.textContent = text; }
      wrap.appendChild(b);
      const meta = document.createElement('div');
      meta.className = 'bubble-meta';
      if (dir === 'in') {
        const btn = document.createElement('div');
        btn.className = 'tts-play'; btn.title = '朗读';
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
        btn.onclick = () => speak(b.textContent);
        meta.appendChild(btn);
      }
      const t = document.createElement('span');
      t.textContent = new Date().toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
      meta.appendChild(t);
      wrap.appendChild(meta);
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
      return b;
    }

    // ── SEND ──
    async function sendMessage() {
      const box = document.getElementById('input-box');
      const text = box.innerText.trim();
      if (!text) return;
      box.innerText = '';
      typing = false; setMorphState(false);
      addBubble(text, 'out');
      await streamTranslation(text);
    }

    // ── BUILD DOUBAO REQUEST BODY ──
    function buildDoubaoBody(text) {
      const isZh = /[一-鿿]/.test(text);
      return {
        model: MODEL,
        input: [{
          role: 'user',
          content: [{
            type: 'input_text',
            text: text,
            translation_options: {
              source_language: isZh ? 'zh' : 'id',
              target_language: isZh ? 'id' : 'zh'
            }
          }]
        }]
      };
    }

    // ── EXTRACT TEXT FROM DOUBAO RESPONSE ──
    function extractDoubaoText(data) {
      const output = data?.output;
      if (Array.isArray(output)) {
        for (const item of output) {
          const content = item?.content;
          if (Array.isArray(content)) {
            for (const c of content) {
              if (c?.type === 'output_text' && c?.text) return c.text;
            }
          }
          if (typeof item?.content === 'string' && item.content) return item.content;
        }
      }
      return null;
    }

    // ── TRANSLATE (Doubao responses API) ──
    async function streamTranslation(userText) {
      const bubble = addBubble('', 'in', true);
      let result = '';
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify(buildDoubaoBody(userText))
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error(err);
        }
        const data = await res.json();
        result = extractDoubaoText(data) || '翻译失败';
        bubble.textContent = result;
        document.getElementById('chat').scrollTop = 9999;
      } catch (err) {
        result = '⚠️ 请求失败：' + (err.message || '网络错误');
        bubble.textContent = result;
      }
      if (!result) { result = '…'; bubble.textContent = result; }
      if (ttsOn && !result.startsWith('⚠️')) speak(result);
      return result;
    }

    // ── NON-STREAM (for Live mode) ──
    async function translateOnce(text) {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify(buildDoubaoBody(text))
        });
        const data = await res.json();
        return extractDoubaoText(data) || '翻译失败';
      } catch (e) { return '网络错误'; }
    }

    // ── VOICE INPUT ──
    function toggleVoiceInput() {
      if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
        alert('请使用 Chrome 或 Safari 以支持语音识别'); return;
      }
      const btn = document.getElementById('mic-btn');
      if (micActive) { recog && recog.stop(); micActive = false; btn.classList.remove('recording'); return; }
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recog = new SR();
      recog.lang = 'zh-CN'; recog.interimResults = true; recog.continuous = false;
      const box = document.getElementById('input-box');
      recog.onresult = e => {
        let t = '';
        for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
        box.innerText = t;
        const hasText = t.trim().length > 0;
        if (hasText !== typing) { typing = hasText; setMorphState(typing); }
      };
      recog.onend = () => { micActive = false; btn.classList.remove('recording'); };
      recog.onerror = () => { micActive = false; btn.classList.remove('recording'); };
      recog.start(); micActive = true; btn.classList.add('recording');
    }

    // ── LIVE MODE ──
    function openLive() {
      document.getElementById('live-overlay').classList.add('active');
      startWaveAnim();
    }
    function closeLive() {
      document.getElementById('live-overlay').classList.remove('active');
      liveActive = false;
      if (liveRecog) { try { liveRecog.stop(); } catch (e) { } liveRecog = null; }
      window.speechSynthesis && window.speechSynthesis.cancel();
      stopWaveAnim();
      document.getElementById('live-orb').className = '';
      setLiveState('idle');
    }
    function startWaveAnim() {
      const bars = document.querySelectorAll('.wave-bar');
      waveTick = setInterval(() => {
        bars.forEach(b => {
          const h = liveActive ? Math.random() * 22 + 4 : Math.random() * 5 + 3;
          b.style.height = h + 'px';
          b.style.background = liveActive ? 'rgba(26,110,245,0.75)' : 'rgba(255,255,255,0.2)';
        });
      }, 110);
    }
    function stopWaveAnim() {
      clearInterval(waveTick);
      document.querySelectorAll('.wave-bar').forEach(b => { b.style.height = '4px'; b.style.background = 'rgba(255,255,255,0.2)'; });
    }
    function setLiveState(s) {
      const orb = document.getElementById('live-orb');
      const lbl = document.getElementById('live-state-label');
      const sts = document.getElementById('live-status');
      orb.className = '';
      if (s === 'idle') { lbl.textContent = '点击麦克风开始'; sts.textContent = '准备就绪'; }
      if (s === 'listening') { orb.classList.add('listening'); lbl.textContent = '正在聆听…'; sts.textContent = '说话中'; }
      if (s === 'thinking') { lbl.textContent = '翻译中…'; sts.textContent = '处理中'; }
      if (s === 'speaking') { orb.classList.add('speaking'); lbl.textContent = '正在播报…'; sts.textContent = '朗读中'; }
    }
    function toggleLiveListen() {
      if (liveActive) {
        liveActive = false;
        if (liveRecog) { try { liveRecog.stop(); } catch (e) { } }
        window.speechSynthesis && window.speechSynthesis.cancel();
        setLiveState('idle');
        document.getElementById('chip-zh').classList.remove('active');
        document.getElementById('chip-id').classList.remove('active');
        document.getElementById('live-translation').textContent = '点击球体重新开始';
        return;
      }
      if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
        alert('请使用 Chrome 或 Safari 以支持语音识别'); return;
      }
      liveActive = true;
      startLiveRound('zh-CN');
    }
    function startLiveRound(lang) {
      if (!liveActive) return;
      const isZh = lang === 'zh-CN';
      document.getElementById('chip-zh').classList.toggle('active', isZh);
      document.getElementById('chip-id').classList.toggle('active', !isZh);
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      liveRecog = new SR();
      liveRecog.lang = lang; liveRecog.interimResults = true; liveRecog.continuous = false;
      setLiveState('listening');
      let finalText = '';
      liveRecog.onresult = e => {
        let interim = '', final = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) final += e.results[i][0].transcript;
          else interim += e.results[i][0].transcript;
        }
        if (final) finalText = final;
        document.getElementById('live-status').textContent = final || interim || '…';
      };
      liveRecog.onend = async () => {
        if (!liveActive) return;
        if (!finalText) { setTimeout(() => startLiveRound(lang), 200); return; }
        setLiveState('thinking');
        document.getElementById('live-translation').textContent = '翻译中…';
        const translation = await translateOnce(finalText);
        document.getElementById('live-translation').textContent = translation;
        addBubble(finalText, 'out');
        addBubble(translation, 'in');
        setLiveState('speaking');
        const u = new SpeechSynthesisUtterance(translation);
        u.lang = isZh ? 'id-ID' : 'zh-CN'; u.rate = 1.0;
        u.onend = () => { if (!liveActive) return; setTimeout(() => startLiveRound(isZh ? 'id-ID' : 'zh-CN'), 500); };
        window.speechSynthesis.speak(u);
      };
      liveRecog.onerror = e => {
        if (e.error === 'no-speech' && liveActive) { setTimeout(() => startLiveRound(lang), 300); return; }
        if (liveActive) setLiveState('idle');
      };
      liveRecog.start();
    }
  </script>
</body>
