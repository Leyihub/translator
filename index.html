<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DSI翻译">
  <title>DSI中印翻译小助手 · 06042005</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f6fa;
      --white: #ffffff;
      --primary: #1a6ef5;
      --primary-light: #e8f0fe;
      --text-main: #1a1a2e;
      --text-muted: #8a8fa8;
      --border: #e8eaf0;
      --live-green: #00c48c;
      --red: #ff4d4f;
      --header-h: 56px;
      --input-h: 96px;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Noto Sans SC', sans-serif;
      color: var(--text-main);
    }

    /* HEADER */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.06);
    }

    #header-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #header-logo svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
    }

    #header-title {
      flex: 1;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -.2px;
    }

    #tts-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg);
      user-select: none;
      transition: all .2s;
    }

    #tts-toggle.on {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    #tts-toggle svg {
      width: 14px;
      height: 14px;
    }

    #tts-label {
      white-space: nowrap;
      font-weight: 500;
    }

    /* CHAT */
    #chat {
      position: fixed;
      top: var(--header-h);
      left: 0;
      right: 0;
      bottom: var(--input-h);
      overflow-y: auto;
      padding: 14px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar {
      width: 3px;
    }

    #chat::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
      border-radius: 3px;
    }

    .hint-msg {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.04);
      border-radius: 20px;
      padding: 5px 14px;
      align-self: center;
      margin: 4px 0;
    }

    .date-divider {
      align-self: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 2px 0 4px;
    }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }

    .bubble-wrap.out {
      align-self: flex-end;
      align-items: flex-end;
    }

    .bubble-wrap.in {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.55;
      word-break: break-word;
    }

    .bubble-wrap.out .bubble {
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    .bubble-wrap.in .bubble {
      background: var(--white);
      color: var(--text-main);
      border-bottom-left-radius: 5px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.07);
    }

    .bubble-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      padding: 0 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tts-play {
      cursor: pointer;
      width: 22px;
      height: 22px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .tts-play svg {
      width: 12px;
      height: 12px;
    }

    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 15px;
      background: var(--primary);
      vertical-align: -3px;
      margin-left: 1px;
      animation: blink 1s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    /* ── LIVE OVERLAY ── */
    /* ══ LIVE OVERLAY ══ */
    #live-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: #000; flex-direction: column;
    }
    #live-overlay.active { display: flex; }
    #live-chat-view {
      flex: 1; overflow-y: auto; padding: 60px 20px 20px;
      display: none; flex-direction: column; gap: 14px;
    }
    #live-chat-view.show { display: flex; }
    #live-chat-view::-webkit-scrollbar { width: 0; }
    .live-msg { max-width: 88%; line-height: 1.55; font-size: 16px; color: rgba(255,255,255,0.92); }
    .live-msg.src { align-self: flex-end; text-align: right; }
    .live-msg.trs { align-self: flex-start; }
    .live-msg .msg-meta { font-size: 11px; opacity: .35; margin-top: 3px; }
    #live-controls {
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: space-around; padding: 28px 32px 44px;
      margin-top: auto;
    }
    #lc-mic {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(40,40,40,0.9); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; transition: background .2s;
    }
    #lc-mic svg { width: 28px; height: 28px; stroke: rgba(255,255,255,0.85);
      fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    #lc-mic.muted { background: rgba(255,77,79,0.25); }
    #lc-mic.muted svg { stroke: #ff4d4f; }
    #lc-mic:disabled { opacity: 0.35; }
    #lc-glow {
      width: 88px; height: 88px; border-radius: 50%; border: none; cursor: pointer;
      background: radial-gradient(circle at 38% 32%, #c8e8ff, #5ab0ff 45%, #1a6ef5);
      box-shadow: 0 0 32px rgba(90,176,255,0.55), 0 0 64px rgba(90,176,255,0.25);
      -webkit-tap-highlight-color: transparent; transition: box-shadow .3s;
    }
    #lc-glow.listening { animation: glowPulse 2s ease-in-out infinite; }
    #lc-glow.off { background: radial-gradient(circle at 38% 32%, #555, #333 60%, #222);
      box-shadow: 0 0 12px rgba(0,0,0,0.6); }
    #lc-glow:disabled { opacity: 0.3; }
    @keyframes glowPulse {
      0%,100% { box-shadow: 0 0 32px rgba(90,176,255,0.6), 0 0 64px rgba(90,176,255,0.28); }
      50%      { box-shadow: 0 0 56px rgba(90,176,255,0.95), 0 0 100px rgba(90,176,255,0.45); }
    }
    #lc-close {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(230,230,230,0.92); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    #lc-close svg { width: 26px; height: 26px; stroke: #222;
      fill: none; stroke-width: 2.5; stroke-linecap: round; }
    #live-status-text {
      position: absolute; top: 16px; left: 0; right: 0;
      text-align: center; font-size: 12px; color: rgba(255,255,255,0.35);
      pointer-events: none; z-index: 1;
    }
    #live-detect-label {
      position: absolute; top: 34px; left: 0; right: 0;
      text-align: center; font-size: 11px; color: rgba(255,255,255,0.22);
      pointer-events: none; z-index: 1;
    }
    .wave-bar,.wv-bar { display: none; }

    /* INPUT AREA */
    #input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--input-h);
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 8px;
    }

    #input-box {
      flex: 1;
      min-height: 38px;
      max-height: 90px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text-main);
      background: var(--bg);
      outline: none;
      overflow-y: auto;
      line-height: 1.4;
      word-break: break-word;
      cursor: text;
    }

    #input-box:empty:before {
      content: attr(data-placeholder);
      color: var(--text-muted);
      pointer-events: none;
    }

    #input-box:focus {
      border-color: var(--primary);
    }

    .action-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .15s;
      background: var(--bg);
    }

    .action-btn svg {
      width: 20px;
      height: 20px;
      stroke: var(--text-muted);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .action-btn:active {
      transform: scale(0.92);
    }

    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon.hidden {
      display: none;
    }

    /* 双模式 input bar */
    #input-area { padding: 0 12px; }

    .input-bar {
      display: flex;
      align-items: center;
      flex: 1;
      gap: 10px;
    }

    #ptt-btn {
      flex: 1;
      height: 64px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 32px;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      transition: background .15s, border-color .15s, color .15s;
      padding: 0 20px;
    }

    #ptt-btn:active,
    #ptt-btn.recording {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }

    #right-btn.send-mode {
      background: var(--primary);
      border-color: var(--primary);
    }

    #right-btn.send-mode svg { stroke: white; }

    /* 浮动识别气泡（按住说话时显示在按钮上方） */
    #ptt-float {
      display: none;
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: calc(var(--input-h) + 14px);
      background: white;
      border-radius: 20px;
      padding: 14px 18px 16px;
      box-shadow: 0 6px 28px rgba(26,110,245,0.18), 0 1px 6px rgba(0,0,0,0.08);
      border: 1.5px solid rgba(26,110,245,0.3);
      z-index: 150;
      animation: floatIn .18s ease;
    }
    #ptt-float.active { display: block; }
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #ptt-float-label {
      font-size: 11px;
      color: var(--primary);
      font-weight: 600;
      letter-spacing: .5px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #ptt-float-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 1s infinite;
    }
    #ptt-float-text {
      font-size: 17px;
      color: var(--text-main);
      line-height: 1.5;
      min-height: 26px;
      word-break: break-word;
    }
    #ptt-float-text:empty::before {
      content: '正在聆听…';
      color: var(--text-muted);
    }
    /* 气泡下方三角箭头 */
    #ptt-float::after {
      content: '';
      position: absolute;
      bottom: -9px;
      left: 40px;
      border: 9px solid transparent;
      border-top-color: white;
      border-bottom: 0;
      filter: drop-shadow(0 2px 1px rgba(26,110,245,0.1));
    }

    /* 翻译气泡下的操作按钮 */
    .bubble-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
    }
    .bub-btn {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 3px 9px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }
    .bub-btn svg {
      width: 11px; height: 11px;
      stroke: var(--text-muted);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    .bub-btn:active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
    .bub-btn:active svg { stroke: var(--primary); }
    .bub-btn.copied { background: #e6fff5; border-color: var(--live-green); color: var(--live-green); }
    .back-trans-row {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg);
      border-radius: 10px;
      padding: 7px 10px;
      margin-top: 6px;
      line-height: 1.5;
      max-width: 240px;
      border-left: 2px solid var(--border);
    }

    /* API key modal */
    #key-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
    }

    #key-modal.active {
      display: flex;
    }

    #key-card {
      background: white;
      border-radius: 16px;
      padding: 24px 20px;
      width: 320px;
      max-width: 90vw;
    }

    #key-card h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    #key-card p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    #key-input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 14px;
      outline: none;
      font-family: monospace;
      margin-bottom: 12px;
    }

    #key-input:focus {
      border-color: var(--primary);
    }

    #key-save {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- API KEY MODAL -->
  <div id="key-modal">
    <div id="key-card">
      <h3>API Key 设置</h3>
      <p>翻译 Key（ARK 平台，用于文字翻译）：</p>
      <input id="key-input" type="password" placeholder="ark-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" />
      <p style="margin-top:10px">AST 代理地址（Live 同声传译模式，部署后填入）：</p>
      <input id="proxy-url-input" type="text" placeholder="wss://your-ast-proxy.onrender.com" autocomplete="off" style="font-size:12px" />
      <button id="key-save" onclick="saveKey()">保存并开始使用</button>
    </div>
  </div>

  <!-- HEADER -->
  <div id="header">
    <div id="header-logo">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L4 6v6c0 5.5 3.8 9.7 8 11 4.2-1.3 8-5.5 8-11V6L12 2z" />
        <path d="M8 12l2.5 2.5L16 9" />
      </svg>
    </div>
    <div id="header-title">DSI中印翻译小助手</div>
    <div id="tts-toggle" class="on" onclick="toggleTTS()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
      </svg>
      <span id="tts-label">自动朗读</span>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div class="date-divider">今天</div>
    <div class="hint-msg">🌐 自动识别中文↔印尼语，发送后自动朗读译文</div>
  </div>

  <!-- PTT 浮动识别气泡 -->
  <div id="ptt-float">
    <div id="ptt-float-label">
      <span id="ptt-float-dot"></span>正在识别
    </div>
    <div id="ptt-float-text"></div>
  </div>

  <!-- INPUT AREA -->
  <div id="input-area">
    <!-- 语音模式（默认） -->
    <div class="input-bar" id="voice-bar">
      <button id="ptt-btn"
        ontouchstart="pttStart(event)" ontouchcancel="pttCancel()"
        onmousedown="pttStart(event)">按住说话</button>
      <button class="action-btn" onclick="switchToText()" title="文字输入">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="4" width="20" height="13" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
          <line x1="7" y1="9" x2="17" y2="9"/>
          <line x1="7" y1="13" x2="13" y2="13"/>
        </svg>
      </button>
      <button class="action-btn" onclick="openLive()" title="Live实时对话">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M6.3 6.3a8 8 0 0 0 0 11.4"/>
          <path d="M17.7 6.3a8 8 0 0 1 0 11.4"/>
          <path d="M3.5 3.5a14 14 0 0 0 0 17"/>
          <path d="M20.5 3.5a14 14 0 0 1 0 17"/>
        </svg>
      </button>
    </div>
    <!-- 文字模式 -->
    <div class="input-bar" id="text-bar" style="display:none">
      <button class="action-btn" onclick="switchToVoice()" title="语音输入">
        <svg viewBox="0 0 24 24">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <div id="input-box" contenteditable="true" role="textbox" aria-label="输入文字翻译" data-placeholder="输入文字翻译…"
        onkeydown="handleKey(event)" oninput="onInputChange(this)"></div>
      <button class="action-btn" id="right-btn" onclick="rightBtnClick()" title="发送 / Live">
        <span class="btn-icon" id="live-icon-wrap">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"/>
            <path d="M6.3 6.3a8 8 0 0 0 0 11.4"/>
            <path d="M17.7 6.3a8 8 0 0 1 0 11.4"/>
            <path d="M3.5 3.5a14 14 0 0 0 0 17"/>
            <path d="M20.5 3.5a14 14 0 0 1 0 17"/>
          </svg>
        </span>
        <span class="btn-icon hidden" id="send-icon-wrap">
          <svg viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </span>
      </button>
    </div>
  </div>

    <!-- LIVE OVERLAY -->
  <div id="live-overlay">
    <span id="live-status-text">正在连接…</span>
    <span id="live-detect-label"></span>
    <div id="live-chat-view"></div>
    <div id="live-controls">
      <button id="lc-mic" disabled onclick="toggleLiveMic()">
        <svg viewBox="0 0 24 24">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button id="lc-glow" disabled onclick="toggleLiveSubtitle()"></button>
      <button id="lc-close" onclick="closeLive()">
        <svg viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    // ── CONFIG ──
    const API_URL = 'https://ark.cn-beijing.volces.com/api/v3/responses';
    const MODEL = 'doubao-seed-translation-250915';

    // ── MIC HELPERS ──
    // 安卓 Chrome 必须先调用 getUserMedia 触发权限弹窗，否则 SpeechRecognition 静默失败
    async function ensureMicPermission() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return true; // 老设备不支持则跳过
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(t => t.stop()); // 立即释放，只需要权限
        return true;
      } catch (e) {
        const denied = e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError';
        alert(denied
          ? '麦克风权限被拒绝，请在浏览器地址栏点击锁形图标，手动开启麦克风权限后刷新页面'
          : '无法访问麦克风：' + e.message);
        return false;
      }
    }

        'not-allowed': '麦克风权限被拒绝，请在浏览器设置中开启麦克风权限后刷新页面',
        'audio-capture': '未检测到麦克风，请检查设备硬件或浏览器权限',
        'service-not-allowed': '此浏览器不允许使用语音识别，请尝试 Chrome 或 Samsung Internet',
        'aborted': null,

    let apiKey = '';

    // ── TTS ──
    // 移动端 speechSynthesis 需在真实手势内先调用一次才能解锁，后续异步才能正常朗读
    let speechUnlocked = false;

    // ── INPUT MORPH ──

    // ── BUBBLE ──
    function addBubble(text, dir, streaming = false) {
      const chat = document.getElementById('chat');
      const wrap = document.createElement('div');
      wrap.className = `bubble-wrap ${dir}`;
      const b = document.createElement('div');
      b.className = 'bubble';
      if (streaming) { b.innerHTML = '<span class="cursor-blink"></span>'; }
      else { b.textContent = text; }
      wrap.appendChild(b);

      const meta = document.createElement('div');
      meta.className = 'bubble-meta';
      if (dir === 'in') {
        // ▶ 朗读
        const ttsBtn = document.createElement('div');
        ttsBtn.className = 'tts-play'; ttsBtn.title = '朗读';
        ttsBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
        ttsBtn.onclick = () => speak(b.textContent);
        meta.appendChild(ttsBtn);

        // ⧉ 复制（纯图标）
        const copyBtn = document.createElement('div');
        copyBtn.className = 'tts-play'; copyBtn.title = '复制';
        const copyIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
        const doneIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
        copyBtn.innerHTML = copyIcon;
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(b.textContent).then(() => {
            copyBtn.innerHTML = doneIcon;
            copyBtn.style.borderColor = 'var(--live-green)';
            setTimeout(() => { copyBtn.innerHTML = copyIcon; copyBtn.style.borderColor = ''; }, 2000);
          }).catch(() => alert('复制失败，请长按文字手动复制'));
        };
        meta.appendChild(copyBtn);

        // ⇄ 回译（纯图标）
        const verifyBtn = document.createElement('div');
        verifyBtn.className = 'tts-play'; verifyBtn.title = '回译核对';
        const verifyIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.37"/></svg>`;
        verifyBtn.innerHTML = verifyIcon;
        let backRow = null;
        verifyBtn.onclick = async () => {
          if (backRow) { backRow.remove(); backRow = null; verifyBtn.style.borderColor = ''; return; }
          verifyBtn.style.opacity = '0.5';
          const result = await translateOnce(b.textContent);
          verifyBtn.style.opacity = '';
          verifyBtn.style.borderColor = 'var(--primary)';
          backRow = document.createElement('div');
          backRow.className = 'back-trans-row';
          backRow.textContent = result;
          wrap.appendChild(backRow);
          chat.scrollTop = chat.scrollHeight;
        };
        meta.appendChild(verifyBtn);
      }
      const t = document.createElement('span');
      t.textContent = new Date().toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
      meta.appendChild(t);
      wrap.appendChild(meta);

      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
      return b;
    }

    // ── SEND ──
    async function sendMessage() {
      const box = document.getElementById('input-box');
      const text = box.innerText.trim();
      if (!text) return;
      box.innerText = '';
      typing = false; setMorphState(false);
      addBubble(text, 'out');
      await streamTranslation(text);
    }

    // ── BUILD DOUBAO REQUEST BODY ──
    function buildDoubaoBody(text) {
      const isZh = /[一-鿿]/.test(text);
      return {
        model: MODEL,
        input: [{
          role: 'user',
          content: [{
            type: 'input_text',
            text: text,
            translation_options: {
              source_language: isZh ? 'zh' : 'id',
              target_language: isZh ? 'id' : 'zh'
            }
          }]
        }]
      };
    }

    // ── EXTRACT TEXT FROM DOUBAO RESPONSE ──
    function extractDoubaoText(data) {
      const output = data?.output;
      if (Array.isArray(output)) {
        for (const item of output) {
          const content = item?.content;
          if (Array.isArray(content)) {
            for (const c of content) {
              if (c?.type === 'output_text' && c?.text) return c.text;
            }
          }
          if (typeof item?.content === 'string' && item.content) return item.content;
        }
      }
      return null;
    }

    // ── TRANSLATE (Doubao responses API) ──
    async function streamTranslation(userText) {
      const bubble = addBubble('', 'in', true);
      let result = '';
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify(buildDoubaoBody(userText))
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error(err);
        }
        const data = await res.json();
        result = extractDoubaoText(data) || '翻译失败';
        bubble.textContent = result;
        document.getElementById('chat').scrollTop = 9999;
      } catch (err) {
        result = '⚠️ 请求失败：' + (err.message || '网络错误');
        bubble.textContent = result;
      }
      if (!result) { result = '…'; bubble.textContent = result; }
      if (ttsOn && !result.startsWith('⚠️')) speak(result);
      return result;
    }

    // ── NON-STREAM (for Live mode) ──
    async function translateOnce(text) {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify(buildDoubaoBody(text))
        });
        const data = await res.json();
        return extractDoubaoText(data) || '翻译失败';
      } catch (e) { return '网络错误'; }
    }

    // ── PTT 按住说话 ──
    let pttActive = false;
    let pttFinalText = '';

    function showPttFloat() {
      document.getElementById('ptt-float-text').textContent = '';
      document.getElementById('ptt-float').classList.add('active');
      document.getElementById('ptt-btn').classList.add('recording');
    }
    function hidePttFloat() {
      document.getElementById('ptt-float').classList.remove('active');
      document.getElementById('ptt-btn').classList.remove('recording');
    }

    // PTT：getUserMedia 在按钮事件（用户手势）内直接调用，绕过 SpeechRecognition 的谷歌依赖
    async function pttStart(e) {
      e.preventDefault();
      if (pttActive) return;

      const proxyUrl = localStorage.getItem('ast_proxy_url') || _DEF_PROXY_URL;

      // 先获取麦克风 —— 此时仍在用户手势上下文 ✅
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
        });
      } catch (err) {
        alert(err.name === 'NotAllowedError'
          ? '麦克风权限被拒绝，请在浏览器地址栏点击锁形图标开启麦克风后刷新'
          : '无法访问麦克风：' + err.message);
        return;
      }

      pttActive = true;
      showPttFloat();

      // 建立 PCM 管道
      const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
      await ctx.resume();
      const rate = ctx.sampleRate;
      const src = ctx.createMediaStreamSource(stream);
      const proc = ctx.createScriptProcessor(4096, 1, 1);

      // 连接 PTT 专用 AST 会话（若未就绪则提示等待）
      let pttWsALocal = null, pttWsBLocal = null;
      let pttReadyLocal = false;
      let pttSrcText = '';

      const makePttWs = (srcLang, tgtLang, onSrc, onTrsEnd) => {
        const ws = new WebSocket(proxyUrl);
        ws.binaryType = 'arraybuffer';
        const sid = genUUID();
        let lastSrc = '', ready = false;
        const t = setTimeout(() => { if (!ready) ws.close(); }, 20000);
        ws.onopen = () => ws.send(astEncJson({
          request_meta: { session_id: sid, resource_id: AST_RES_ID },
          event: AST_EV.START,
          source_audio: { format: 'wav', codec: 'raw', rate: 16000, bits: 16, channel: 1 },
          request: { mode: 's2t', source_language: srcLang, target_language: tgtLang }
        }));
        ws.onmessage = ev => {
          const msg = astDecode(ev.data);
          if (!msg) return;
          if (msg.event === AST_EV.SESSION_OK) { clearTimeout(t); ready = true; pttReadyLocal = true; }
          if (msg.event === AST_EV.SRC_RESP && msg.text) { lastSrc = msg.text; onSrc(msg.text); }
          if (msg.event === AST_EV.TRS_END && msg.text) onTrsEnd(lastSrc, msg.text);
        };
        ws.onerror = () => clearTimeout(t);
        return ws;
      };

      pttWsALocal = makePttWs('zh', 'id',
        t => { document.getElementById('ptt-float-text').textContent = t; pttSrcText = t; },
        (src, trs) => { if (isZh(src)) { addBubble(src, 'out'); addBubble(trs, 'in'); if (ttsOn) speak(trs); } }
      );
      pttWsBLocal = makePttWs('id', 'zh',
        t => { if (!isZh(t)) { document.getElementById('ptt-float-text').textContent = t; pttSrcText = t; } },
        (src, trs) => { if (!isZh(src)) { addBubble(src, 'out'); addBubble(trs, 'in'); if (ttsOn) speak(trs); } }
      );

      proc.onaudioprocess = ev => {
        if (!pttActive || !pttReadyLocal) return;
        const f32 = ev.inputBuffer.getChannelData(0);
        const ratio = rate / 16000;
        const len = Math.round(f32.length / ratio);
        const i16 = new Int16Array(len);
        for (let i = 0; i < len; i++) {
          i16[i] = Math.max(-32768, Math.min(32767, f32[Math.round(i * ratio)] * 32768));
        }
        const enc = astEncAudio(i16.buffer);
        if (pttWsALocal?.readyState === WebSocket.OPEN) pttWsALocal.send(enc);
        if (pttWsBLocal?.readyState === WebSocket.OPEN) pttWsBLocal.send(enc);
      };
      src.connect(proc);
      proc.connect(ctx.destination);

      // 释放：停止 PCM，关闭临时会话
      const onUp = () => {
        document.removeEventListener('touchend', onUp, true);
        document.removeEventListener('mouseup', onUp, true);
        pttActive = false;
        hidePttFloat();
        proc.disconnect(); ctx.close().catch(() => {});
        stream.getTracks().forEach(t => t.stop());
        [pttWsALocal, pttWsBLocal].forEach(ws => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            try { ws.send(astEncJson({ event: AST_EV.FINISH })); } catch {}
            ws.close();
          }
        });
      };
      document.addEventListener('touchend', onUp, { capture: true, once: true });
      document.addEventListener('mouseup', onUp, { capture: true, once: true });
    }

    function pttCancel() {
      if (!pttActive) return;
      pttActive = false;
      hidePttFloat();
    }

    // 共用：停止 Live 模式 PCM 捕获
    function stopPcm(full) {
      if (astPcmProc) { astPcmProc.disconnect(); astPcmProc = null; }
      if (full) {
        if (astPcmCtx) { astPcmCtx.close().catch(() => {}); astPcmCtx = null; }
        if (astPcmStream) { astPcmStream.getTracks().forEach(t => t.stop()); astPcmStream = null; }
      }
    }

    // ══════════════════════════════════════════
    // ── LIVE MODE (豆包同声传译 2.0 + 智能降级) ──
    // ══════════════════════════════════════════

    const AST_WS_URL    = 'wss://openspeech.bytedance.com/api/v4/ast/v2/translate';
    const AST_RES_ID    = 'volc.service_type.10053';
    const AST_EV = {
      START:100, TASK:200, FINISH:102,
      SESSION_OK:150, SRC_START:650, SRC_RESP:651, SRC_END:652,
      TRS_START:653, TRS_RESP:654, TRS_END:655,
      DONE:152, FAIL:153, MUTED:250
    };

    let liveViewMode = 'chat';
    let liveRunning  = false;
    let astApiKey    = '';  // 存代理 URL，如 wss://your-proxy.onrender.com

    // PCM 捕获（Live 模式两个 AST Session 共享）
    let astPcmCtx = null, astPcmProc = null, astPcmStream = null;
    let liveMicActive = false;

    // PTT 模式独立 AST 会话
    let pttWsA = null, pttWsB = null, pttReadyA = false, pttReadyB = false;
    // 两个并行 WebSocket：zh→id 和 id→zh
    let astWsA = null, astReadyA = false; // zh→id
    let astWsB = null, astReadyB = false; // id→zh
    let waveAnimTick = null;

    // ── 工具 ──
    function genUUID() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }
    function isZh(text) { return /[一-鿿]/.test(text); }

    // AST 二进制帧：4字节协议头 + 4字节载荷长度 + 载荷
    // Header: [0]=0x11(v1,4B头), [1]=类型(0x10=JSON请求/0x20=音频), [2]=0x10(JSON)/0x00(PCM), [3]=0x00
    function astEncJson(obj) {
      const pay = new TextEncoder().encode(JSON.stringify(obj));
      const buf = new ArrayBuffer(8 + pay.byteLength);
      const v = new DataView(buf);
      v.setUint8(0,0x11); v.setUint8(1,0x10); v.setUint8(2,0x10); v.setUint8(3,0x00);
      v.setUint32(4, pay.byteLength, false);
      new Uint8Array(buf, 8).set(pay);
      return buf;
    }
    function astEncAudio(pcm) {
      const buf = new ArrayBuffer(8 + pcm.byteLength);
      const v = new DataView(buf);
      v.setUint8(0,0x11); v.setUint8(1,0x20); v.setUint8(2,0x00); v.setUint8(3,0x00);
      v.setUint32(4, pcm.byteLength, false);
      new Uint8Array(buf, 8).set(new Uint8Array(pcm));
      return buf;
    }
    function astDecode(buffer) {
      try {
        const v = new DataView(buffer);
        const sz = v.getUint32(4, false);
        if (!sz || buffer.byteLength < 8 + sz) return null;
        return JSON.parse(new TextDecoder().decode(new Uint8Array(buffer, 8, sz)));
      } catch { return null; }
    }

    // ── UI 辅助 ──
    function setLiveStatus(text) {
      var el = document.getElementById('live-status-text');
      if (el) el.textContent = text;
    }
    function setDetectLabel(text) {
      document.getElementById('live-detect-label').textContent = text;
    }

    function addLiveMsg(srcText, trsText, srcLangLabel, trsLangLabel) {
      const chat = document.getElementById('live-chat-view');
      const time = new Date().toLocaleTimeString('zh', { hour:'2-digit', minute:'2-digit' });

      const mkDiv = (txt, cls, label) => {
        const d = document.createElement('div');
        d.className = `live-msg ${cls}`;
        d.textContent = txt;
        const m = document.createElement('div');
        m.className = 'msg-meta';
        m.textContent = `${label} · ${time}`;
        d.appendChild(m);
        return d;
      };

      if (srcText) chat.appendChild(mkDiv(srcText, 'src', srcLangLabel));
      if (trsText) chat.appendChild(mkDiv(trsText, 'trs', trsLangLabel));

      // 最多保留 5 条对话（每条 = src + trs 共 2 个 div，最多 10 个子元素）
      while (chat.children.length > 10) chat.removeChild(chat.firstChild);
      chat.scrollTop = chat.scrollHeight;
    }

    function startWaveBars(active) {
      var g = document.getElementById('lc-glow');
      if (g) { if (active) g.classList.add('listening'); else g.classList.remove('listening'); }
    }
    function stopWaveBars() { startWaveBars(false); }

    // ── 视图切换 ──
    // ── 开 / 关 Live ──
    function openLive() {
      liveSubtitleOn = false;
      document.getElementById('live-overlay').classList.add('active');
      document.getElementById('live-chat-view').classList.remove('show');
      startLiveSession();
    }
    function closeLive() {
      stopLiveSession();
      document.getElementById('live-overlay').classList.remove('active');
    }
    async function startLiveSession() {
      if (liveRunning) return;
      liveRunning = true;
      setLiveStatus('正在启动…');
      startWaveBars(false);
      astApiKey = localStorage.getItem('ast_proxy_url') || _DEF_PROXY_URL;
      if (astApiKey && astApiKey.startsWith('wss://')) {
        setDetectLabel('豆包同声传译 2.0 · 按住下方按钮说话');
        await startASTDual();
      } else {
        setDetectLabel('浏览器识别模式 · 自动识别语种');
        startFallbackLive();
      }
    }
    function stopLiveSession() {
      liveRunning = false;
      liveMicActive = false;
      liveSubtitleOn = false;
      const mic = document.getElementById('lc-mic');
      const glow = document.getElementById('lc-glow');
      if (mic) { mic.disabled = true; mic.classList.remove('muted'); }
      if (glow) { glow.disabled = true; glow.classList.remove('listening'); }
      document.getElementById('live-chat-view').classList.remove('show');
      stopASTAll();
      stopFallbackLive();
      stopWaveBars();
      setLiveStatus('已断开');
      stopPcm(true);
    }

    // ── 麦克风开关（左按钮）──
    async function toggleLiveMic() {
      const mic = document.getElementById('lc-mic');

      if (liveMicActive) {
        liveMicActive = false;
        mic.classList.add('muted');
        setLiveStatus('麦克风已关闭');
        startWaveBars(false);
        return;
      }

      if (!astPcmStream) {
        try {
          astPcmStream = await navigator.mediaDevices.getUserMedia({
            audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
          });
          astPcmCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
          await astPcmCtx.resume();
          const rate = astPcmCtx.sampleRate;
          const src = astPcmCtx.createMediaStreamSource(astPcmStream);
          astPcmProc = astPcmCtx.createScriptProcessor(4096, 1, 1);
          astPcmProc.onaudioprocess = ev => {
            if (!liveMicActive) return;
            const f32 = ev.inputBuffer.getChannelData(0);
            const ratio = rate / 16000;
            const len = Math.round(f32.length / ratio);
            const i16 = new Int16Array(len);
            for (let i = 0; i < len; i++) {
              i16[i] = Math.max(-32768, Math.min(32767, f32[Math.round(i * ratio)] * 32768));
            }
            const enc = astEncAudio(i16.buffer);
            if (astReadyA && astWsA?.readyState === WebSocket.OPEN) astWsA.send(enc);
            if (astReadyB && astWsB?.readyState === WebSocket.OPEN) astWsB.send(enc);
          };
          src.connect(astPcmProc);
          astPcmProc.connect(astPcmCtx.destination);
        } catch (err) {
          setLiveStatus('⚠️ 麦克风：' + err.message);
          return;
        }
      }

      liveMicActive = true;
      mic.classList.remove('muted');
      setLiveStatus('🎤 正在聆听…');
      startWaveBars(true);
    }

    // ── 字幕开关（中间发光球）──
    let liveSubtitleOn = false;
    function toggleLiveSubtitle() {
      liveSubtitleOn = !liveSubtitleOn;
      const chat = document.getElementById('live-chat-view');
      chat.classList.toggle('show', liveSubtitleOn);
      if (liveSubtitleOn) chat.scrollTop = chat.scrollHeight;
    }

    // ════════════════════════════════════
    // ── AST 2.0：双 Session 并行 ──
    //    Session A: zh→id（检测中文输入）
    //    Session B: id→zh（检测印尼语输入）
    //    同一路 PCM 音频推送两边，根据返回内容判断哪边有效
    // ════════════════════════════════════
    async function startASTDual() {
      setLiveStatus('正在连接同声传译服务…');
      try {
        // Render 免费实例冷启动需 30-60 秒，先发 HTTP 唤醒，再建 WebSocket
        const httpUrl = astApiKey.replace(/^wss:\/\//, 'https://');
        try {
          setLiveStatus('正在唤醒代理服务器（首次连接约需 30-60 秒）…');
          const ctrl = new AbortController();
          const t = setTimeout(() => ctrl.abort(), 65000);
          await fetch(httpUrl, { signal: ctrl.signal });
          clearTimeout(t);
          setLiveStatus('代理已就绪，正在建立传译连接…');
        } catch (_) {
          setLiveStatus('正在连接同声传译服务…');
        }

        // 使用后端代理 URL，代理负责添加 X-Api-Key 鉴权头
        const makeUrl = () => astApiKey; // 直接用代理 wss:// URL

        let connectedCount = 0;
        let failedCount = 0;

        const onBothFailed = () => {
          setLiveStatus('⚠️ AST 连接失败（服务器不支持 URL 参数鉴权，需后端代理）· 自动切换浏览器识别');
          stopASTAll();
          if (liveRunning) startFallbackLive();
        };

        astWsA = buildASTWs(makeUrl(), 'zh', 'id', {
          onReady: async () => {
            astReadyA = true;
            connectedCount++;
            if (connectedCount === 1) {
              setLiveStatus('就绪，点击麦克风开始');
              startWaveBars(false);
              document.getElementById('lc-mic').disabled = false;
              document.getElementById('lc-glow').disabled = false;
              setDetectLabel('中文 ↔ Indonesia');
            }
          },
          onSrc: () => {},
          onSrcEnd: () => {},
          onTrsEnd: (src, trs) => {
            if (!src || !isZh(src)) return;
            addLiveMsg(src, trs, '中文', 'Indonesia');
            if (ttsOn) speak(trs);
            setDetectLabel('检测到：中文 → Indonesia');
          },
          onError: () => { failedCount++; if (failedCount >= 2) onBothFailed(); }
        });

        astWsB = buildASTWs(makeUrl(), 'id', 'zh', {
          onReady: async () => {
            astReadyB = true;
            connectedCount++;
            if (connectedCount === 1) {
              setLiveStatus('就绪，点击麦克风开始');
              startWaveBars(false);
              document.getElementById('lc-mic').disabled = false;
              document.getElementById('lc-glow').disabled = false;
              setDetectLabel('中文 ↔ Indonesia');
            }
          },
          onSrc: () => {},
          onSrcEnd: () => {},
          onTrsEnd: (src, trs) => {
            if (!src || isZh(src)) return;
            addLiveMsg(src, trs, 'Indonesia', '中文');
            if (ttsOn) speak(trs);
            setDetectLabel('检测到：Indonesia → 中文');
          },
          onError: () => { failedCount++; if (failedCount >= 2) onBothFailed(); }
        });
      } catch (err) {
        setLiveStatus('⚠️ ' + err.message);
        startFallbackLive();
      }
    }

    function buildASTWs(url, srcLang, tgtLang, cb) {
      const ws = new WebSocket(url);
      ws.binaryType = 'arraybuffer';
      const sid = genUUID();
      let lastSrc = '';
      let sessionOk = false;

      // If SESSION_OK not received within 20s, treat as failure
      const sessionTimer = setTimeout(() => {
        if (!sessionOk) { ws.close(); cb.onError(); }
      }, 20000);

      ws.onopen = () => {
        ws.send(astEncJson({
          request_meta: { session_id: sid, resource_id: AST_RES_ID },
          event: AST_EV.START,
          source_audio: { format: 'wav', codec: 'raw', rate: 16000, bits: 16, channel: 1 },
          request: { mode: 's2t', source_language: srcLang, target_language: tgtLang }
        }));
      };

      ws.onmessage = e => {
        const msg = astDecode(e.data);
        if (!msg) return;
        if (msg.event === AST_EV.SESSION_OK)  { clearTimeout(sessionTimer); sessionOk = true; cb.onReady(); }
        if (msg.event === AST_EV.SRC_RESP && msg.text) { lastSrc = msg.text; cb.onSrc(msg.text); }
        if (msg.event === AST_EV.SRC_END && msg.text)  { lastSrc = msg.text; }
        if (msg.event === AST_EV.TRS_END && msg.text)  { cb.onTrsEnd(lastSrc, msg.text); lastSrc = ''; }
        if (msg.event === AST_EV.FAIL) { clearTimeout(sessionTimer); setLiveStatus('⚠️ 会话错误：' + (msg.message||''), 'error'); cb.onError(); }
      };

      ws.onerror = () => { clearTimeout(sessionTimer); cb.onError(); };
      ws.onclose = (evt) => {
        clearTimeout(sessionTimer);
        if (ws === astWsA) astReadyA = false;
        if (ws === astWsB) astReadyB = false;
        if (!evt.wasClean && !sessionOk) cb.onError();
      };
      return ws;
    }

    function stopASTAll() {
      astReadyA = false; astReadyB = false;
      [astWsA, astWsB].forEach(ws => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          try { ws.send(astEncJson({ event: AST_EV.FINISH })); } catch {}
          ws.close();
        }
      });
      astWsA = null; astWsB = null;
      if (astPcmProc)   { astPcmProc.disconnect(); astPcmProc = null; }
      if (astPcmCtx)    { astPcmCtx.close().catch(()=>{}); astPcmCtx = null; }
      if (astPcmStream) { astPcmStream.getTracks().forEach(t => t.stop()); astPcmStream = null; }
    }

    // startPCMCapture 已移至 livePttPress（手动触发）

    // ════════════════════════════════════
    // ── 降级：Web Speech API + 翻译 API ──
    //    智能交替：zh失败/空 → 试id，id失败/空 → 试zh
    //    识别到内容后根据 detectLang 判断翻译方向
    // ════════════════════════════════════
    let liveRecog = null;
    let liveNextLang = 'zh-CN'; // 下一轮识别语言

    function startFallbackLive() {
      if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
        setLiveStatus('⚠️ 浏览器不支持语音识别，请使用 Chrome/Safari'); return;
      }
      setLiveStatus('🎤 正在聆听…');
      startWaveBars(true);
      liveNextLang = 'zh-CN';
      fallbackRound();
    }
    function stopFallbackLive() {
      if (liveRecog) { try { liveRecog.abort(); } catch {} liveRecog = null; }
      window.speechSynthesis && window.speechSynthesis.cancel();
    }
    function fallbackRound() {
      if (!liveRunning) return;
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      liveRecog = new SR();
      liveRecog.lang = liveNextLang;
      liveRecog.interimResults = true;
      liveRecog.continuous = false;
      let finalText = '';

      liveRecog.onresult = e => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
          else interim += e.results[i][0].transcript;
        }
        
      };

      liveRecog.onend = async () => {
        if (!liveRunning) return;
        if (!finalText) {
          // 本轮无语音 → 切换语言重试
          liveNextLang = liveNextLang === 'zh-CN' ? 'id-ID' : 'zh-CN';
          setTimeout(fallbackRound, 250);
          return;
        }
        // 根据内容判断实际语言和翻译方向
        const detectedZh = isZh(finalText);
        const srcLabel = detectedZh ? '中文' : 'Indonesia';
        const trsLabel = detectedZh ? 'Indonesia' : '中文';
        setDetectLabel(`检测到：${srcLabel} → ${trsLabel}`);
        setLiveStatus('翻译中…');

        const trans = await translateOnce(finalText);
        addLiveMsg(finalText, trans, srcLabel, trsLabel);
        if (ttsOn) speak(trans);

        // 下一轮听「对方的语言」
        liveNextLang = detectedZh ? 'id-ID' : 'zh-CN';
        setLiveStatus('🎤 正在聆听…');
        setTimeout(fallbackRound, 400);
      };

      liveRecog.onerror = e => {
        if (!liveRunning) return;
        if (e.error === 'no-speech') {
          liveNextLang = liveNextLang === 'zh-CN' ? 'id-ID' : 'zh-CN';
          setTimeout(fallbackRound, 250);
          return;
        }
        showSpeechError(e.error);
      };
      try { liveRecog.start(); } catch {}
    }
  </script>
</body>
