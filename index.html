<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DSI翻译">
  <title>DSI中印翻译小助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f6fa;
      --white: #ffffff;
      --primary: #1a6ef5;
      --primary-light: #e8f0fe;
      --text-main: #1a1a2e;
      --text-muted: #8a8fa8;
      --border: #e8eaf0;
      --live-green: #00c48c;
      --red: #ff4d4f;
      --header-h: 56px;
      --input-h: 96px;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Noto Sans SC', sans-serif;
      color: var(--text-main);
    }

    /* HEADER */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.06);
    }

    #header-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #header-logo svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
    }

    #header-title {
      flex: 1;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -.2px;
    }

    #tts-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg);
      user-select: none;
      transition: all .2s;
    }

    #tts-toggle.on {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    #tts-toggle svg {
      width: 14px;
      height: 14px;
    }

    #tts-label {
      white-space: nowrap;
      font-weight: 500;
    }

    /* CHAT */
    #chat {
      position: fixed;
      top: var(--header-h);
      left: 0;
      right: 0;
      bottom: var(--input-h);
      overflow-y: auto;
      padding: 14px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar {
      width: 3px;
    }

    #chat::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
      border-radius: 3px;
    }

    .hint-msg {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.04);
      border-radius: 20px;
      padding: 5px 14px;
      align-self: center;
      margin: 4px 0;
    }

    .date-divider {
      align-self: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 2px 0 4px;
    }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }

    .bubble-wrap.out {
      align-self: flex-end;
      align-items: flex-end;
    }

    .bubble-wrap.in {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.55;
      word-break: break-word;
    }

    .bubble-wrap.out .bubble {
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    .bubble-wrap.in .bubble {
      background: var(--white);
      color: var(--text-main);
      border-bottom-left-radius: 5px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.07);
    }

    .bubble-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      padding: 0 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tts-play {
      cursor: pointer;
      width: 22px;
      height: 22px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .tts-play svg {
      width: 12px;
      height: 12px;
    }

    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 15px;
      background: var(--primary);
      vertical-align: -3px;
      margin-left: 1px;
      animation: blink 1s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    /* ── LIVE OVERLAY ── */
    #live-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #0b0f1a;
      flex-direction: column;
    }
    #live-overlay.active { display: flex; }

    /* 顶部栏 */
    #live-hdr {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    #live-hdr-title {
      flex: 1;
      font-size: 15px;
      font-weight: 700;
      color: white;
      letter-spacing: .3px;
    }
    #live-hdr-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      font-weight: 400;
      margin-left: 6px;
    }
    .live-icon-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .live-icon-btn svg {
      width: 18px; height: 18px;
      stroke: rgba(255,255,255,0.7);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* 检测状态栏 */
    #live-detect-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    #live-detect-icon { font-size: 15px; }
    #live-detect-label {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      font-weight: 500;
    }

    /* 聊天视图 */
    #live-chat-view {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #live-chat-view::-webkit-scrollbar { width: 3px; }
    #live-chat-view::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    .live-msg {
      max-width: 85%;
      border-radius: 14px;
      padding: 10px 14px;
      line-height: 1.5;
    }
    .live-msg.src {
      align-self: flex-end;
      background: var(--primary);
      color: white;
      font-size: 15px;
      border-bottom-right-radius: 4px;
    }
    .live-msg.trs {
      align-self: flex-start;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.9);
      font-size: 15px;
      border-bottom-left-radius: 4px;
    }
    .live-msg .msg-meta {
      font-size: 11px;
      opacity: .5;
      margin-top: 4px;
    }

    /* 声波视图 */
    #live-wave-view {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }
    #live-wv-src {
      font-size: 20px;
      font-weight: 700;
      color: white;
      text-align: center;
      max-width: 300px;
      min-height: 32px;
      line-height: 1.4;
    }
    #live-wv-trs {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      max-width: 300px;
      min-height: 28px;
      line-height: 1.4;
    }
    #live-wv-bars {
      display: flex;
      gap: 5px;
      align-items: flex-end;
      height: 48px;
    }
    .wv-bar {
      width: 5px;
      border-radius: 5px;
      background: var(--primary);
      transition: height 80ms;
      min-height: 4px;
    }

    /* 底部状态栏 */
    #live-status-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    #live-status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
      transition: background .3s;
    }
    #live-status-dot.listening { background: var(--live-green); animation: blink 1.2s infinite; }
    #live-status-dot.thinking  { background: #f5a623; }
    #live-status-dot.error     { background: var(--red); }
    #live-status-text {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      flex: 1;
    }

    /* wave-bar (旧，保留兼容) */
    .wave-bar { width: 4px; border-radius: 4px; background: rgba(255,255,255,.2); transition: height .1s; }

    #live-direction.visible {
      opacity: 1;
    }

    /* INPUT AREA */
    #input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--input-h);
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 8px;
    }

    #input-box {
      flex: 1;
      min-height: 38px;
      max-height: 90px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text-main);
      background: var(--bg);
      outline: none;
      overflow-y: auto;
      line-height: 1.4;
      word-break: break-word;
      cursor: text;
    }

    #input-box:empty:before {
      content: attr(data-placeholder);
      color: var(--text-muted);
      pointer-events: none;
    }

    #input-box:focus {
      border-color: var(--primary);
    }

    .action-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .15s;
      background: var(--bg);
    }

    .action-btn svg {
      width: 20px;
      height: 20px;
      stroke: var(--text-muted);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .action-btn:active {
      transform: scale(0.92);
    }

    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon.hidden {
      display: none;
    }

    /* 双模式 input bar */
    #input-area { padding: 0 12px; }

    .input-bar {
      display: flex;
      align-items: center;
      flex: 1;
      gap: 10px;
    }

    #ptt-btn {
      flex: 1;
      height: 64px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 32px;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      transition: background .15s, border-color .15s, color .15s;
      padding: 0 20px;
    }

    #ptt-btn:active,
    #ptt-btn.recording {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }

    #right-btn.send-mode {
      background: var(--primary);
      border-color: var(--primary);
    }

    #right-btn.send-mode svg { stroke: white; }

    /* 浮动识别气泡（按住说话时显示在按钮上方） */
    #ptt-float {
      display: none;
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: calc(var(--input-h) + 14px);
      background: white;
      border-radius: 20px;
      padding: 14px 18px 16px;
      box-shadow: 0 6px 28px rgba(26,110,245,0.18), 0 1px 6px rgba(0,0,0,0.08);
      border: 1.5px solid rgba(26,110,245,0.3);
      z-index: 150;
      animation: floatIn .18s ease;
    }
    #ptt-float.active { display: block; }
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #ptt-float-label {
      font-size: 11px;
      color: var(--primary);
      font-weight: 600;
      letter-spacing: .5px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #ptt-float-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 1s infinite;
    }
    #ptt-float-text {
      font-size: 17px;
      color: var(--text-main);
      line-height: 1.5;
      min-height: 26px;
      word-break: break-word;
    }
    #ptt-float-text:empty::before {
      content: '正在聆听…';
      color: var(--text-muted);
    }
    /* 气泡下方三角箭头 */
    #ptt-float::after {
      content: '';
      position: absolute;
      bottom: -9px;
      left: 40px;
      border: 9px solid transparent;
      border-top-color: white;
      border-bottom: 0;
      filter: drop-shadow(0 2px 1px rgba(26,110,245,0.1));
    }

    /* 翻译气泡下的操作按钮 */
    .bubble-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
    }
    .bub-btn {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 3px 9px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }
    .bub-btn svg {
      width: 11px; height: 11px;
      stroke: var(--text-muted);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    .bub-btn:active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
    .bub-btn:active svg { stroke: var(--primary); }
    .bub-btn.copied { background: #e6fff5; border-color: var(--live-green); color: var(--live-green); }
    .back-trans-row {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg);
      border-radius: 10px;
      padding: 7px 10px;
      margin-top: 6px;
      line-height: 1.5;
      max-width: 240px;
      border-left: 2px solid var(--border);
    }

    /* API key modal */
    #key-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
    }

    #key-modal.active {
      display: flex;
    }

    #key-card {
      background: white;
      border-radius: 16px;
      padding: 24px 20px;
      width: 320px;
      max-width: 90vw;
    }

    #key-card h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    #key-card p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    #key-input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 14px;
      outline: none;
      font-family: monospace;
      margin-bottom: 12px;
    }

    #key-input:focus {
      border-color: var(--primary);
    }

    #key-save {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- API KEY MODAL -->
  <div id="key-modal">
    <div id="key-card">
      <h3>API Key 设置</h3>
      <p>翻译 Key（ARK 平台，用于文字翻译）：</p>
      <input id="key-input" type="password" placeholder="ark-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" />
      <p style="margin-top:10px">AST 代理地址（Live 同声传译模式，部署后填入）：</p>
      <input id="proxy-url-input" type="text" placeholder="wss://your-ast-proxy.onrender.com" autocomplete="off" style="font-size:12px" />
      <button id="key-save" onclick="saveKey()">保存并开始使用</button>
    </div>
  </div>

  <!-- HEADER -->
  <div id="header">
    <div id="header-logo">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L4 6v6c0 5.5 3.8 9.7 8 11 4.2-1.3 8-5.5 8-11V6L12 2z" />
        <path d="M8 12l2.5 2.5L16 9" />
      </svg>
    </div>
    <div id="header-title">DSI中印翻译小助手</div>
    <div id="tts-toggle" class="on" onclick="toggleTTS()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
      </svg>
      <span id="tts-label">自动朗读</span>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div class="date-divider">今天</div>
    <div class="hint-msg">🌐 自动识别中文↔印尼语，发送后自动朗读译文</div>
  </div>

  <!-- PTT 浮动识别气泡 -->
  <div id="ptt-float">
    <div id="ptt-float-label">
      <span id="ptt-float-dot"></span>正在识别
    </div>
    <div id="ptt-float-text"></div>
  </div>

  <!-- INPUT AREA -->
  <div id="input-area">
    <!-- 语音模式（默认） -->
    <div class="input-bar" id="voice-bar">
      <button id="ptt-btn"
        ontouchstart="pttStart(event)" ontouchcancel="pttCancel()"
        onmousedown="pttStart(event)">按住说话</button>
      <button class="action-btn" onclick="switchToText()" title="文字输入">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="4" width="20" height="13" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
          <line x1="7" y1="9" x2="17" y2="9"/>
          <line x1="7" y1="13" x2="13" y2="13"/>
        </svg>
      </button>
      <button class="action-btn" onclick="openLive()" title="Live实时对话">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M6.3 6.3a8 8 0 0 0 0 11.4"/>
          <path d="M17.7 6.3a8 8 0 0 1 0 11.4"/>
          <path d="M3.5 3.5a14 14 0 0 0 0 17"/>
          <path d="M20.5 3.5a14 14 0 0 1 0 17"/>
        </svg>
      </button>
    </div>
    <!-- 文字模式 -->
    <div class="input-bar" id="text-bar" style="display:none">
      <button class="action-btn" onclick="switchToVoice()" title="语音输入">
        <svg viewBox="0 0 24 24">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <div id="input-box" contenteditable="true" role="textbox" aria-label="输入文字翻译" data-placeholder="输入文字翻译…"
        onkeydown="handleKey(event)" oninput="onInputChange(this)"></div>
      <button class="action-btn" id="right-btn" onclick="rightBtnClick()" title="发送 / Live">
        <span class="btn-icon" id="live-icon-wrap">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"/>
            <path d="M6.3 6.3a8 8 0 0 0 0 11.4"/>
            <path d="M17.7 6.3a8 8 0 0 1 0 11.4"/>
            <path d="M3.5 3.5a14 14 0 0 0 0 17"/>
            <path d="M20.5 3.5a14 14 0 0 1 0 17"/>
          </svg>
        </span>
        <span class="btn-icon hidden" id="send-icon-wrap">
          <svg viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </span>
      </button>
    </div>
  </div>

  <!-- LIVE OVERLAY -->
  <div id="live-overlay">
    <!-- 顶部栏 -->
    <div id="live-hdr">
      <button class="live-icon-btn" onclick="closeLive()" title="关闭">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="live-hdr-title">同声传译 2.0<span id="live-hdr-sub">豆包 AST</span></div>
      <button class="live-icon-btn" id="live-view-btn" onclick="toggleLiveView()" title="切换视图">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
    </div>

    <!-- 检测状态 -->
    <div id="live-detect-bar">
      <span id="live-detect-icon">🎤</span>
      <span id="live-detect-label">自动识别语种 · 中文 ↔ Indonesia</span>
    </div>

    <!-- 聊天记录视图 -->
    <div id="live-chat-view"></div>

    <!-- 声波视图 -->
    <div id="live-wave-view">
      <div id="live-wv-src"></div>
      <div id="live-wv-trs"></div>
      <div id="live-wv-bars">
        <div class="wv-bar" style="height:6px"></div>
        <div class="wv-bar" style="height:14px"></div>
        <div class="wv-bar" style="height:9px"></div>
        <div class="wv-bar" style="height:22px"></div>
        <div class="wv-bar" style="height:12px"></div>
        <div class="wv-bar" style="height:18px"></div>
        <div class="wv-bar" style="height:8px"></div>
        <div class="wv-bar" style="height:16px"></div>
        <div class="wv-bar" style="height:10px"></div>
      </div>
    </div>

    <!-- 状态栏 -->
    <div id="live-status-bar">
      <div id="live-status-dot"></div>
      <span id="live-status-text">正在启动...</span>
    </div>
  </div>

  <script>
    // ── CONFIG ──
    const API_URL = 'https://ark.cn-beijing.volces.com/api/v3/responses';
    const MODEL = 'doubao-seed-translation-250915';

    // ── MIC HELPERS ──
    // 安卓 Chrome 必须先调用 getUserMedia 触发权限弹窗，否则 SpeechRecognition 静默失败
    async function ensureMicPermission() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return true; // 老设备不支持则跳过
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(t => t.stop()); // 立即释放，只需要权限
        return true;
      } catch (e) {
        const denied = e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError';
        alert(denied
          ? '麦克风权限被拒绝，请在浏览器地址栏点击锁形图标，手动开启麦克风权限后刷新页面'
          : '无法访问麦克风：' + e.message);
        return false;
      }
    }

    // 将 SpeechRecognition 错误码转换为用户可读的提示
    function showSpeechError(code) {
      const map = {
        'network': '语音识别网络错误\n\n安卓 Chrome 的语音识别需要连接谷歌服务器。\n如在中国大陆使用，请开启 VPN 后重试，或改用文字输入。',
        'not-allowed': '麦克风权限被拒绝，请在浏览器设置中开启麦克风权限后刷新页面',
        'audio-capture': '未检测到麦克风，请检查设备硬件或浏览器权限',
        'service-not-allowed': '此浏览器不允许使用语音识别，请尝试 Chrome 或 Samsung Internet',
        'aborted': null,
        'no-speech': null,
      };
      const msg = map[code];
      if (msg) alert(msg);
    }

    let apiKey = '';
    let ttsOn = true;
    let liveActive = false;
    let waveTick;
    let typing = false;

    // ── 默认配置（预置 Key，无需手动填写）──
    const _DEF_TRANS_KEY  = 'ark-cf33cf52-7da4-4e6f-9e93-5d78e422644d-9ee6f';
    const _DEF_PROXY_URL  = 'wss://ast-proxy.onrender.com';

    // ── INIT ──
    window.onload = () => {
      // 优先用 localStorage 保存的值，否则用内置默认值
      apiKey    = localStorage.getItem('doubao_api_key')  || _DEF_TRANS_KEY;
      astApiKey = localStorage.getItem('ast_proxy_url')   || _DEF_PROXY_URL;
      // 同步到 localStorage，方便后续读取
      localStorage.setItem('doubao_api_key', apiKey);
      localStorage.setItem('ast_proxy_url',  astApiKey);
      // 回填设置弹窗
      document.getElementById('key-input').value        = apiKey;
      document.getElementById('proxy-url-input').value  = astApiKey;
      // 已有内置 Key，不自动弹出设置框（长按 Logo 可手动打开）
    };

    function saveKey() {
      const val = document.getElementById('key-input').value.trim();
      if (val) { apiKey = val; localStorage.setItem('doubao_api_key', val); }
      const proxyVal = document.getElementById('proxy-url-input').value.trim();
      if (proxyVal) { astApiKey = proxyVal; localStorage.setItem('ast_proxy_url', proxyVal); }
      document.getElementById('key-modal').classList.remove('active');
    }

    // 长按 header 可重置 Key
    document.addEventListener('DOMContentLoaded', () => {
      let pressTimer;
      const logo = document.getElementById('header-logo');
      logo.addEventListener('touchstart', () => { pressTimer = setTimeout(() => { resetKey(); }, 1500); });
      logo.addEventListener('touchend', () => clearTimeout(pressTimer));
      logo.addEventListener('mousedown', () => { pressTimer = setTimeout(() => { resetKey(); }, 1500); });
      logo.addEventListener('mouseup', () => clearTimeout(pressTimer));
    });

    function resetKey() {
      if (!confirm('重置 API Key？')) return;
      localStorage.removeItem('doubao_api_key');
      apiKey = '';
      document.getElementById('key-input').value = '';
      document.getElementById('key-modal').classList.add('active');
    }

    // ── TTS ──
    // 移动端 speechSynthesis 需在真实手势内先调用一次才能解锁，后续异步才能正常朗读
    let speechUnlocked = false;
    function unlockSpeech() {
      if (speechUnlocked || !('speechSynthesis' in window)) return;
      speechUnlocked = true;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
    }
    document.addEventListener('touchstart', unlockSpeech, { once: true, passive: true });
    document.addEventListener('mousedown', unlockSpeech, { once: true });

    function toggleTTS() {
      ttsOn = !ttsOn;
      document.getElementById('tts-toggle').classList.toggle('on', ttsOn);
      document.getElementById('tts-label').textContent = ttsOn ? '自动朗读' : '朗读关';
    }
    function detectLang(text) { return /[\u4e00-\u9fff]/.test(text) ? 'zh' : 'id'; }
    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = detectLang(text) === 'zh' ? 'zh-CN' : 'id-ID';
      u.rate = 1.0;
      window.speechSynthesis.speak(u);
    }

    // ── INPUT MORPH ──
    function onInputChange(el) {
      const hasText = el.innerText.trim().length > 0;
      if (hasText !== typing) { typing = hasText; setMorphState(typing); }
    }
    function setMorphState(isTyping) {
      document.getElementById('live-icon-wrap').classList.toggle('hidden', isTyping);
      document.getElementById('send-icon-wrap').classList.toggle('hidden', !isTyping);
      document.getElementById('right-btn').classList.toggle('send-mode', isTyping);
    }
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }
    function rightBtnClick() { if (typing) { sendMessage(); } else { openLive(); } }

    // ── MODE SWITCH ──
    function switchToVoice() {
      document.getElementById('voice-bar').style.display = 'flex';
      document.getElementById('text-bar').style.display = 'none';
    }
    function switchToText() {
      document.getElementById('voice-bar').style.display = 'none';
      document.getElementById('text-bar').style.display = 'flex';
      setTimeout(() => document.getElementById('input-box').focus(), 50);
    }

    // ── BUBBLE ──
    function addBubble(text, dir, streaming = false) {
      const chat = document.getElementById('chat');
      const wrap = document.createElement('div');
      wrap.className = `bubble-wrap ${dir}`;
      const b = document.createElement('div');
      b.className = 'bubble';
      if (streaming) { b.innerHTML = '<span class="cursor-blink"></span>'; }
      else { b.textContent = text; }
      wrap.appendChild(b);

      const meta = document.createElement('div');
      meta.className = 'bubble-meta';
      if (dir === 'in') {
        // ▶ 朗读
        const ttsBtn = document.createElement('div');
        ttsBtn.className = 'tts-play'; ttsBtn.title = '朗读';
        ttsBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
        ttsBtn.onclick = () => speak(b.textContent);
        meta.appendChild(ttsBtn);

        // ⧉ 复制（纯图标）
        const copyBtn = document.createElement('div');
        copyBtn.className = 'tts-play'; copyBtn.title = '复制';
        const copyIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
        const doneIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
        copyBtn.innerHTML = copyIcon;
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(b.textContent).then(() => {
            copyBtn.innerHTML = doneIcon;
            copyBtn.style.borderColor = 'var(--live-green)';
            setTimeout(() => { copyBtn.innerHTML = copyIcon; copyBtn.style.borderColor = ''; }, 2000);
          }).catch(() => alert('复制失败，请长按文字手动复制'));
        };
        meta.appendChild(copyBtn);

        // ⇄ 回译（纯图标）
        const verifyBtn = document.createElement('div');
        verifyBtn.className = 'tts-play'; verifyBtn.title = '回译核对';
        const verifyIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.37"/></svg>`;
        verifyBtn.innerHTML = verifyIcon;
        let backRow = null;
        verifyBtn.onclick = async () => {
          if (backRow) { backRow.remove(); backRow = null; verifyBtn.style.borderColor = ''; return; }
          verifyBtn.style.opacity = '0.5';
          const result = await translateOnce(b.textContent);
          verifyBtn.style.opacity = '';
          verifyBtn.style.borderColor = 'var(--primary)';
          backRow = document.createElement('div');
          backRow.className = 'back-trans-row';
          backRow.textContent = result;
          wrap.appendChild(backRow);
          chat.scrollTop = chat.scrollHeight;
        };
        meta.appendChild(verifyBtn);
      }
      const t = document.createElement('span');
      t.textContent = new Date().toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
      meta.appendChild(t);
      wrap.appendChild(meta);

      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
      return b;
    }

    // ── SEND ──
    async function sendMessage() {
      const box = document.getElementById('input-box');
      const text = box.innerText.trim();
      if (!text) return;
      box.innerText = '';
      typing = false; setMorphState(false);
      addBubble(text, 'out');
      await streamTranslation(text);
    }

    // ── BUILD DOUBAO REQUEST BODY ──
    function buildDoubaoBody(text) {
      const isZh = /[一-鿿]/.test(text);
      return {
        model: MODEL,
        input: [{
          role: 'user',
          content: [{
            type: 'input_text',
            text: text,
            translation_options: {
              source_language: isZh ? 'zh' : 'id',
              target_language: isZh ? 'id' : 'zh'
            }
          }]
        }]
      };
    }

    // ── EXTRACT TEXT FROM DOUBAO RESPONSE ──
    function extractDoubaoText(data) {
      const output = data?.output;
      if (Array.isArray(output)) {
        for (const item of output) {
          const content = item?.content;
          if (Array.isArray(content)) {
            for (const c of content) {
              if (c?.type === 'output_text' && c?.text) return c.text;
            }
          }
          if (typeof item?.content === 'string' && item.content) return item.content;
        }
      }
      return null;
    }

    // ── TRANSLATE (Doubao responses API) ──
    async function streamTranslation(userText) {
      const bubble = addBubble('', 'in', true);
      let result = '';
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify(buildDoubaoBody(userText))
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error(err);
        }
        const data = await res.json();
        result = extractDoubaoText(data) || '翻译失败';
        bubble.textContent = result;
        document.getElementById('chat').scrollTop = 9999;
      } catch (err) {
        result = '⚠️ 请求失败：' + (err.message || '网络错误');
        bubble.textContent = result;
      }
      if (!result) { result = '…'; bubble.textContent = result; }
      if (ttsOn && !result.startsWith('⚠️')) speak(result);
      return result;
    }

    // ── NON-STREAM (for Live mode) ──
    async function translateOnce(text) {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify(buildDoubaoBody(text))
        });
        const data = await res.json();
        return extractDoubaoText(data) || '翻译失败';
      } catch (e) { return '网络错误'; }
    }

    // ── PTT 按住说话 ──
    let pttRecog = null;
    let pttActive = false;
    let pttShouldSend = false;
    let pttFinalText = '';

    function showPttFloat() {
      document.getElementById('ptt-float-text').textContent = '';
      document.getElementById('ptt-float').classList.add('active');
      document.getElementById('ptt-btn').classList.add('recording');
    }

    function hidePttFloat() {
      document.getElementById('ptt-float').classList.remove('active');
      document.getElementById('ptt-btn').classList.remove('recording');
    }

    function pttStart(e) {
      e.preventDefault();
      if (pttActive) return;
      if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
        alert('您的浏览器不支持语音识别，请使用 Chrome（安卓）或 Safari（iPhone）'); return;
      }
      pttActive = true; pttShouldSend = false; pttFinalText = '';
      showPttFloat();

      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      pttRecog = new SR();
      // 按住说话：用设备默认语言识别，后续由 detectLang 判断翻译方向
      pttRecog.lang = navigator.language || 'zh-CN';
      pttRecog.interimResults = true; pttRecog.continuous = true;
      pttRecog.onresult = ev => {
        let interim = '';
        for (let i = ev.resultIndex; i < ev.results.length; i++) {
          if (ev.results[i].isFinal) pttFinalText += ev.results[i][0].transcript;
          else interim += ev.results[i][0].transcript;
        }
        document.getElementById('ptt-float-text').textContent = pttFinalText || interim;
      };
      pttRecog.onend = () => {
        const text = pttFinalText.trim();
        pttActive = false; hidePttFloat();
        if (pttShouldSend && text) { addBubble(text, 'out'); streamTranslation(text); }
      };
      pttRecog.onerror = ev => {
        pttActive = false; pttShouldSend = false; hidePttFloat(); showSpeechError(ev.error);
      };
      pttRecog.start();

      // 手指/鼠标抬起时（无论在屏幕哪里）→ 发送
      const onUp = () => {
        document.removeEventListener('touchend', onUp, true);
        document.removeEventListener('mouseup', onUp, true);
        if (!pttActive) return;
        pttShouldSend = true;
        document.getElementById('ptt-float-text').textContent =
          (document.getElementById('ptt-float-text').textContent || '') + ' ✓';
        if (pttRecog) { try { pttRecog.stop(); } catch (err) {} }
      };
      document.addEventListener('touchend', onUp, { capture: true, once: true });
      document.addEventListener('mouseup', onUp, { capture: true, once: true });
    }

    function pttCancel() {
      if (!pttActive) return;
      pttShouldSend = false; pttActive = false;
      if (pttRecog) { try { pttRecog.abort(); } catch (err) {} }
      hidePttFloat();
    }

    // ══════════════════════════════════════════
    // ── LIVE MODE (豆包同声传译 2.0 + 智能降级) ──
    // ══════════════════════════════════════════

    const AST_WS_URL    = 'wss://openspeech.bytedance.com/api/v4/ast/v2/translate';
    const AST_RES_ID    = 'volc.service_type.10053';
    const AST_EV = {
      START:100, TASK:200, FINISH:102,
      SESSION_OK:150, SRC_START:650, SRC_RESP:651, SRC_END:652,
      TRS_START:653, TRS_RESP:654, TRS_END:655,
      DONE:152, FAIL:153, MUTED:250
    };

    let liveViewMode = 'chat';
    let liveRunning  = false;
    let astApiKey    = '';  // 存代理 URL，如 wss://your-proxy.onrender.com

    // PCM 捕获（两个 AST Session 共享同一路音频）
    let astPcmCtx = null, astPcmProc = null, astPcmStream = null;
    // 预热：在用户手势上下文中提前申请麦克风
    let _prewarmStream = null, _prewarmCtx = null;
    // 两个并行 WebSocket：zh→id 和 id→zh
    let astWsA = null, astReadyA = false; // zh→id
    let astWsB = null, astReadyB = false; // id→zh
    let waveAnimTick = null;

    // ── 工具 ──
    function genUUID() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }
    function isZh(text) { return /[一-鿿]/.test(text); }

    // AST 二进制帧：4字节协议头 + 4字节载荷长度 + 载荷
    // Header: [0]=0x11(v1,4B头), [1]=类型(0x10=JSON请求/0x20=音频), [2]=0x10(JSON)/0x00(PCM), [3]=0x00
    function astEncJson(obj) {
      const pay = new TextEncoder().encode(JSON.stringify(obj));
      const buf = new ArrayBuffer(8 + pay.byteLength);
      const v = new DataView(buf);
      v.setUint8(0,0x11); v.setUint8(1,0x10); v.setUint8(2,0x10); v.setUint8(3,0x00);
      v.setUint32(4, pay.byteLength, false);
      new Uint8Array(buf, 8).set(pay);
      return buf;
    }
    function astEncAudio(pcm) {
      const buf = new ArrayBuffer(8 + pcm.byteLength);
      const v = new DataView(buf);
      v.setUint8(0,0x11); v.setUint8(1,0x20); v.setUint8(2,0x00); v.setUint8(3,0x00);
      v.setUint32(4, pcm.byteLength, false);
      new Uint8Array(buf, 8).set(new Uint8Array(pcm));
      return buf;
    }
    function astDecode(buffer) {
      try {
        const v = new DataView(buffer);
        const sz = v.getUint32(4, false);
        if (!sz || buffer.byteLength < 8 + sz) return null;
        return JSON.parse(new TextDecoder().decode(new Uint8Array(buffer, 8, sz)));
      } catch { return null; }
    }

    // ── UI 辅助 ──
    function setLiveStatus(text, dot) {
      document.getElementById('live-status-text').textContent = text;
      const el = document.getElementById('live-status-dot');
      el.className = dot || '';
    }
    function setDetectLabel(text) {
      document.getElementById('live-detect-label').textContent = text;
    }

    function addLiveMsg(srcText, trsText, srcLangLabel, trsLangLabel) {
      const chat = document.getElementById('live-chat-view');
      const time = new Date().toLocaleTimeString('zh', { hour:'2-digit', minute:'2-digit' });

      const mkDiv = (txt, cls, label) => {
        const d = document.createElement('div');
        d.className = `live-msg ${cls}`;
        d.textContent = txt;
        const m = document.createElement('div');
        m.className = 'msg-meta';
        m.textContent = `${label} · ${time}`;
        d.appendChild(m);
        return d;
      };

      if (srcText) chat.appendChild(mkDiv(srcText, 'src', srcLangLabel));
      if (trsText) chat.appendChild(mkDiv(trsText, 'trs', trsLangLabel));
      chat.scrollTop = chat.scrollHeight;

      if (srcText) document.getElementById('live-wv-src').textContent = srcText;
      if (trsText) document.getElementById('live-wv-trs').textContent = trsText;
    }

    function startWaveBars(active) {
      clearInterval(waveAnimTick);
      waveAnimTick = setInterval(() => {
        document.querySelectorAll('.wv-bar').forEach(b => {
          const h = active ? Math.random() * 38 + 6 : Math.random() * 5 + 3;
          b.style.height = h + 'px';
          b.style.background = active ? 'var(--primary)' : 'rgba(255,255,255,0.15)';
        });
      }, 90);
    }
    function stopWaveBars() {
      clearInterval(waveAnimTick);
      document.querySelectorAll('.wv-bar').forEach(b => {
        b.style.height = '4px';
        b.style.background = 'rgba(255,255,255,0.15)';
      });
    }

    // ── 视图切换 ──
    function toggleLiveView() {
      liveViewMode = liveViewMode === 'chat' ? 'wave' : 'chat';
      document.getElementById('live-chat-view').style.display  = liveViewMode==='chat' ? '' : 'none';
      document.getElementById('live-wave-view').style.display  = liveViewMode==='wave' ? 'flex' : 'none';
    }

    // ── 开 / 关 Live ──
    function openLive() {
      document.getElementById('live-overlay').classList.add('active');
      document.getElementById('live-chat-view').style.display = '';
      document.getElementById('live-wave-view').style.display = 'none';
      liveViewMode = 'chat';
      // 在用户手势上下文（点击瞬间）预先申请麦克风权限和 AudioContext
      // 移动端 Chrome 要求必须在手势内调用，否则异步连接后再调用会被拒绝
      _prewarmMic();
      startLiveSession();
    }

    async function _prewarmMic() {
      try {
        _prewarmStream = await navigator.mediaDevices.getUserMedia({
          audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
        });
        _prewarmCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        await _prewarmCtx.resume();
      } catch (e) {
        setLiveStatus('⚠️ 麦克风权限被拒绝，请在浏览器设置中允许麦克风', 'error');
      }
    }
    function closeLive() {
      stopLiveSession();
      document.getElementById('live-overlay').classList.remove('active');
    }
    async function startLiveSession() {
      if (liveRunning) return;
      liveRunning = true;
      setLiveStatus('正在启动…', '');
      startWaveBars(false);
      astApiKey = localStorage.getItem('ast_proxy_url') || _DEF_PROXY_URL;
      if (astApiKey && astApiKey.startsWith('wss://')) {
        setDetectLabel('豆包同声传译 2.0 · 自动识别语种');
        await startASTDual();
      } else {
        setDetectLabel('浏览器识别模式 · 自动识别语种（配置代理可升级至 AST 2.0）');
        startFallbackLive();
      }
    }
    function stopLiveSession() {
      liveRunning = false;
      stopASTAll();
      stopFallbackLive();
      stopWaveBars();
      setLiveStatus('已停止', '');
      if (_prewarmStream) { _prewarmStream.getTracks().forEach(t => t.stop()); _prewarmStream = null; }
      if (_prewarmCtx)    { _prewarmCtx.close().catch(() => {}); _prewarmCtx = null; }
    }

    // ════════════════════════════════════
    // ── AST 2.0：双 Session 并行 ──
    //    Session A: zh→id（检测中文输入）
    //    Session B: id→zh（检测印尼语输入）
    //    同一路 PCM 音频推送两边，根据返回内容判断哪边有效
    // ════════════════════════════════════
    async function startASTDual() {
      setLiveStatus('正在连接同声传译服务…', '');
      try {
        // Render 免费实例冷启动需 30-60 秒，先发 HTTP 唤醒，再建 WebSocket
        const httpUrl = astApiKey.replace(/^wss:\/\//, 'https://');
        try {
          setLiveStatus('正在唤醒代理服务器（首次连接约需 30-60 秒）…', '');
          const ctrl = new AbortController();
          const t = setTimeout(() => ctrl.abort(), 65000);
          await fetch(httpUrl, { signal: ctrl.signal });
          clearTimeout(t);
          setLiveStatus('代理已就绪，正在建立传译连接…', '');
        } catch (_) {
          setLiveStatus('正在连接同声传译服务…', '');
        }

        // 使用后端代理 URL，代理负责添加 X-Api-Key 鉴权头
        const makeUrl = () => astApiKey; // 直接用代理 wss:// URL

        let connectedCount = 0;
        let failedCount = 0;

        const onBothFailed = () => {
          setLiveStatus('⚠️ AST 连接失败（服务器不支持 URL 参数鉴权，需后端代理）· 自动切换浏览器识别', 'error');
          stopASTAll();
          if (liveRunning) startFallbackLive();
        };

        astWsA = buildASTWs(makeUrl(), 'zh', 'id', {
          onReady: async () => {
            astReadyA = true;
            connectedCount++;
            if (connectedCount === 1) { // 第一个就绪时启动 PCM
              setLiveStatus('🎤 正在聆听（双语自动识别）…', 'listening');
              startWaveBars(true);
              await startPCMCapture();
            }
          },
          onSrc: t => document.getElementById('live-wv-src').textContent = t,
          onSrcEnd: t => { /* 由 onTrsEnd 统一输出 */ },
          onTrsEnd: (src, trs) => {
            if (!src || !isZh(src)) return; // A 负责中文输入
            addLiveMsg(src, trs, '中文', 'Indonesia');
            if (ttsOn) speak(trs);
            setDetectLabel('检测到：中文 → Indonesia');
          },
          onError: () => { failedCount++; if (failedCount >= 2) onBothFailed(); }
        });

        astWsB = buildASTWs(makeUrl(), 'id', 'zh', {
          onReady: async () => {
            astReadyB = true;
            connectedCount++;
            if (connectedCount === 1) {
              setLiveStatus('🎤 正在聆听（双语自动识别）…', 'listening');
              startWaveBars(true);
              await startPCMCapture();
            }
          },
          onSrc: t => { if (!isZh(t)) document.getElementById('live-wv-src').textContent = t; },
          onSrcEnd: t => { /* 由 onTrsEnd 统一输出 */ },
          onTrsEnd: (src, trs) => {
            if (!src || isZh(src)) return; // B 负责印尼语输入
            addLiveMsg(src, trs, 'Indonesia', '中文');
            if (ttsOn) speak(trs);
            setDetectLabel('检测到：Indonesia → 中文');
          },
          onError: () => { failedCount++; if (failedCount >= 2) onBothFailed(); }
        });
      } catch (err) {
        setLiveStatus('⚠️ ' + err.message, 'error');
        startFallbackLive();
      }
    }

    function buildASTWs(url, srcLang, tgtLang, cb) {
      const ws = new WebSocket(url);
      ws.binaryType = 'arraybuffer';
      const sid = genUUID();
      let lastSrc = '';
      let sessionOk = false;

      // If SESSION_OK not received within 20s, treat as failure
      const sessionTimer = setTimeout(() => {
        if (!sessionOk) { ws.close(); cb.onError(); }
      }, 20000);

      ws.onopen = () => {
        ws.send(astEncJson({
          request_meta: { session_id: sid, resource_id: AST_RES_ID },
          event: AST_EV.START,
          source_audio: { format: 'wav', codec: 'raw', rate: 16000, bits: 16, channel: 1 },
          request: { mode: 's2t', source_language: srcLang, target_language: tgtLang }
        }));
      };

      ws.onmessage = e => {
        const msg = astDecode(e.data);
        if (!msg) return;
        if (msg.event === AST_EV.SESSION_OK)  { clearTimeout(sessionTimer); sessionOk = true; cb.onReady(); }
        if (msg.event === AST_EV.SRC_RESP && msg.text) { lastSrc = msg.text; cb.onSrc(msg.text); }
        if (msg.event === AST_EV.SRC_END && msg.text)  { lastSrc = msg.text; }
        if (msg.event === AST_EV.TRS_END && msg.text)  { cb.onTrsEnd(lastSrc, msg.text); lastSrc = ''; }
        if (msg.event === AST_EV.FAIL) { clearTimeout(sessionTimer); setLiveStatus('⚠️ 会话错误：' + (msg.message||''), 'error'); cb.onError(); }
      };

      ws.onerror = () => { clearTimeout(sessionTimer); cb.onError(); };
      ws.onclose = (evt) => {
        clearTimeout(sessionTimer);
        if (ws === astWsA) astReadyA = false;
        if (ws === astWsB) astReadyB = false;
        if (!evt.wasClean && !sessionOk) cb.onError();
      };
      return ws;
    }

    function stopASTAll() {
      astReadyA = false; astReadyB = false;
      [astWsA, astWsB].forEach(ws => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          try { ws.send(astEncJson({ event: AST_EV.FINISH })); } catch {}
          ws.close();
        }
      });
      astWsA = null; astWsB = null;
      if (astPcmProc)   { astPcmProc.disconnect(); astPcmProc = null; }
      if (astPcmCtx)    { astPcmCtx.close().catch(()=>{}); astPcmCtx = null; }
      if (astPcmStream) { astPcmStream.getTracks().forEach(t => t.stop()); astPcmStream = null; }
    }

    async function startPCMCapture() {
      if (astPcmStream) return;
      try {
        // Use pre-warmed stream/context obtained during user gesture; fall back to new request
        astPcmStream = _prewarmStream || await navigator.mediaDevices.getUserMedia({
          audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
        });
        astPcmCtx = _prewarmCtx || new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        _prewarmStream = null; _prewarmCtx = null;
        if (astPcmCtx.state === 'suspended') await astPcmCtx.resume();
        const actualRate = astPcmCtx.sampleRate;
        const src = astPcmCtx.createMediaStreamSource(astPcmStream);
        astPcmProc = astPcmCtx.createScriptProcessor(4096, 1, 1);
        astPcmProc.onaudioprocess = e => {
          const f32 = e.inputBuffer.getChannelData(0);
          const ratio = actualRate / 16000;
          const len = Math.round(f32.length / ratio);
          const i16 = new Int16Array(len);
          for (let i = 0; i < len; i++) {
            i16[i] = Math.max(-32768, Math.min(32767, f32[Math.round(i * ratio)] * 32768));
          }
          const enc = astEncAudio(i16.buffer);
          if (astReadyA && astWsA?.readyState === WebSocket.OPEN) astWsA.send(enc);
          if (astReadyB && astWsB?.readyState === WebSocket.OPEN) astWsB.send(enc);
        };
        src.connect(astPcmProc);
        astPcmProc.connect(astPcmCtx.destination);
      } catch (err) {
        setLiveStatus('⚠️ 麦克风失败：' + err.message, 'error');
      }
    }

    // ════════════════════════════════════
    // ── 降级：Web Speech API + 翻译 API ──
    //    智能交替：zh失败/空 → 试id，id失败/空 → 试zh
    //    识别到内容后根据 detectLang 判断翻译方向
    // ════════════════════════════════════
    let liveRecog = null;
    let liveNextLang = 'zh-CN'; // 下一轮识别语言

    function startFallbackLive() {
      if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
        setLiveStatus('⚠️ 浏览器不支持语音识别，请使用 Chrome/Safari', 'error'); return;
      }
      setLiveStatus('🎤 正在聆听…', 'listening');
      startWaveBars(true);
      liveNextLang = 'zh-CN';
      fallbackRound();
    }
    function stopFallbackLive() {
      if (liveRecog) { try { liveRecog.abort(); } catch {} liveRecog = null; }
      window.speechSynthesis && window.speechSynthesis.cancel();
    }
    function fallbackRound() {
      if (!liveRunning) return;
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      liveRecog = new SR();
      liveRecog.lang = liveNextLang;
      liveRecog.interimResults = true;
      liveRecog.continuous = false;
      let finalText = '';

      liveRecog.onresult = e => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
          else interim += e.results[i][0].transcript;
        }
        document.getElementById('live-wv-src').textContent = finalText || interim;
      };

      liveRecog.onend = async () => {
        if (!liveRunning) return;
        if (!finalText) {
          // 本轮无语音 → 切换语言重试
          liveNextLang = liveNextLang === 'zh-CN' ? 'id-ID' : 'zh-CN';
          setTimeout(fallbackRound, 250);
          return;
        }
        // 根据内容判断实际语言和翻译方向
        const detectedZh = isZh(finalText);
        const srcLabel = detectedZh ? '中文' : 'Indonesia';
        const trsLabel = detectedZh ? 'Indonesia' : '中文';
        setDetectLabel(`检测到：${srcLabel} → ${trsLabel}`);
        setLiveStatus('翻译中…', 'thinking');

        const trans = await translateOnce(finalText);
        addLiveMsg(finalText, trans, srcLabel, trsLabel);
        if (ttsOn) speak(trans);

        // 下一轮听「对方的语言」
        liveNextLang = detectedZh ? 'id-ID' : 'zh-CN';
        setLiveStatus('🎤 正在聆听…', 'listening');
        setTimeout(fallbackRound, 400);
      };

      liveRecog.onerror = e => {
        if (!liveRunning) return;
        if (e.error === 'no-speech') {
          liveNextLang = liveNextLang === 'zh-CN' ? 'id-ID' : 'zh-CN';
          setTimeout(fallbackRound, 250);
          return;
        }
        showSpeechError(e.error);
      };
      try { liveRecog.start(); } catch {}
    }
  </script>
</body>
